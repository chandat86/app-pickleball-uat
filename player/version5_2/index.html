<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<!-- Luôn fetch HTML mới — tránh browser cache file cũ -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Pickleball v5 — Xem Giải Đấu</title>
<style>
/* system font - no import needed */
:root{
  --bg:#07101e;--bg2:#0d1b30;--bg3:#122040;--bg4:#172848;
  --bdr:#1c3456;--bdr2:#254878;--bdr3:#2e5a94;
  --ac:#0ea5e9;--ac2:#38bdf8;--ac3:#0284c7;
  --gn:#22c55e;--gn2:#16a34a;--or:#f59e0b;
  --rd:#ef4444;--pu:#a855f7;--cy:#06b6d4;
  --tx:#e8f0fe;--tx2:#94a3b8;--tx3:#64748b;--tx4:#475569;
  --fn:-apple-system,'Segoe UI',system-ui,Arial,sans-serif;--fh:-apple-system,'Segoe UI',system-ui,Arial,sans-serif;
  --r:10px;--r2:14px;--shadow:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;width:100%;max-width:100vw;
  background-image:radial-gradient(ellipse 120% 60% at 50% -20%,rgba(14,165,233,.08),transparent 60%)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes liveDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.login-wrap{width:100%;max-width:400px;animation:fadeUp .4s ease}
.login-logo{text-align:center;margin-bottom:28px}
.logo-icon{width:72px;height:72px;margin:0 auto 12px;background:linear-gradient(135deg,#0ea5e9,#22c55e);
  border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 8px 32px rgba(14,165,233,.4)}
.logo-title{font-family:var(--fh);font-size:13px;font-weight:800;letter-spacing:3px;color:var(--ac);text-transform:uppercase}
.logo-sub{font-family:var(--fh);font-size:24px;font-weight:900;color:var(--tx);letter-spacing:.5px;margin-top:3px}
.logo-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,.12);color:var(--gn);
  border:1px solid rgba(34,197,94,.25);font-size:10px;font-weight:800;letter-spacing:2px;
  padding:3px 10px;border-radius:20px;text-transform:uppercase;margin-top:6px}
.login-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:20px;
  padding:28px 24px;box-shadow:var(--shadow),0 0 0 1px rgba(14,165,233,.05)}
.login-card h3{font-family:var(--fh);font-size:20px;font-weight:800;margin-bottom:4px}
.login-card p{font-size:12px;color:var(--tx3);margin-bottom:20px}
.fl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:5px}
.fi{width:100%;padding:12px 14px;background:var(--bg3);border:1.5px solid var(--bdr2);
  border-radius:var(--r);color:var(--tx);font-family:var(--fn);font-size:15px;outline:none;
  transition:border-color .15s,box-shadow .15s;margin-bottom:14px}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.btn-login{width:100%;padding:14px;font-family:var(--fh);font-size:16px;font-weight:800;
  background:linear-gradient(135deg,var(--ac3),var(--ac));color:#fff;border:none;
  border-radius:var(--r);cursor:pointer;transition:opacity .15s,transform .1s;
  box-shadow:0 4px 16px rgba(14,165,233,.35)}
.btn-login:active{transform:scale(.98);opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;
  padding:10px 14px;font-size:13px;color:#fca5a5;margin-top:12px;display:none}

/* ── TOPBAR ── */
#topbar{position:sticky;top:0;z-index:100;background:rgba(7,16,30,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;height:52px;gap:8px;width:100%;box-sizing:border-box}
.tb-logo{font-family:var(--fh);font-size:18px;font-weight:900;color:var(--ac);flex-shrink:0}
.tb-sep{width:1px;height:22px;background:var(--bdr);flex-shrink:0}
.tb-giai{flex:1;min-width:0}
.tb-gname{font-family:var(--fh);font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-gsub{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-live-badge{display:none;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--or);
  background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);padding:4px 9px;border-radius:20px;flex-shrink:0}
.tb-live-badge .dot{width:6px;height:6px;background:var(--or);border-radius:50%;animation:liveDot 1s infinite}
.tb-logout{background:none;border:1px solid var(--bdr);border-radius:8px;padding:5px 10px;
  color:var(--tx3);font-size:12px;cursor:pointer;font-family:var(--fn);flex-shrink:0}
.tb-logout:hover{color:var(--tx);border-color:var(--bdr2)}

/* ── NAV ── */
#navtabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg2);overflow-x:auto;scrollbar-width:none;
  position:sticky;top:52px;z-index:90;width:100%;box-sizing:border-box}
#navtabs::-webkit-scrollbar{display:none}
.ntab{padding:10px 12px;font-family:var(--fh);font-size:12px;font-weight:700;border:none;
  background:transparent;color:var(--tx3);cursor:pointer;white-space:nowrap;
  border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:color .15s;
  display:flex;align-items:center;gap:4px;flex-shrink:0}
.ntab:hover{color:var(--tx)}
.ntab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* ── ND FILTER ── */
#nd-filter-bar{background:var(--bg2);border-bottom:1px solid var(--bdr);display:none;
  gap:6px;padding:6px 10px;overflow-x:auto;scrollbar-width:none;
  position:sticky;top:96px;z-index:85;width:100%;box-sizing:border-box}
#nd-filter-bar::-webkit-scrollbar{display:none}
.nd-chip{padding:5px 11px;font-size:11px;font-weight:700;border-radius:20px;white-space:nowrap;
  border:1.5px solid var(--bdr2);background:transparent;color:var(--tx3);cursor:pointer;
  font-family:var(--fn);transition:all .15s;flex-shrink:0}
.nd-chip.on{background:var(--ac3);border-color:var(--ac);color:#fff}

/* ── REFRESH BAR ── */
#rbar{background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;
  justify-content:space-between;padding:7px 14px;position:sticky;top:var(--rbar-top,100px);z-index:80}
.update-time{font-size:11px;color:var(--tx3)}
.rfbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;background:rgba(14,165,233,.1);
  border:1px solid rgba(14,165,233,.2);border-radius:8px;color:var(--ac);font-size:11px;
  font-weight:700;cursor:pointer;font-family:var(--fn)}
.rfbtn:hover{background:rgba(14,165,233,.2)}
.rfbtn:disabled{opacity:.5;cursor:not-allowed}

/* ── DEBUG ── */
#debug-info{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  padding:8px 14px;font-size:11px;color:#fca5a5;font-family:monospace;line-height:1.6}

/* ── MAIN ── */
#main{padding:8px 10px;max-width:1100px;margin:0 auto;box-sizing:border-box;overflow-x:hidden}
.page{display:none}.page.on{display:block}

/* ── SPIN ── */
.spin-wrap{display:flex;justify-content:center;padding:48px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--bdr2);
  border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:56px 20px;color:var(--tx3)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-msg{font-size:15px;font-family:var(--fh);font-weight:700}
.empty-sub{font-size:12px;margin-top:6px;opacity:.7}

/* ══ LIVE CARDS ══ */
.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
@media(max-width:600px){
  .live-grid{grid-template-columns:1fr}
  .ntab{padding:8px 10px;font-size:11px;gap:3px}
  .bk-round{min-width:135px}
  .bk-card{margin:0 3px;border-radius:6px}
  .bk-tname{font-size:10px}
  .bxh-tbl{font-size:10px}
  .bxh-tbl th{font-size:8px;padding:4px 3px;letter-spacing:0}
  .bxh-tbl td{padding:6px 3px}
  .rank-badge{width:18px;height:18px;font-size:10px;border-radius:4px}
  #main{padding:6px 6px}
  .bang-card{border-radius:8px}
  .bang-head{padding:10px 12px}
  .mr-team{font-size:11px}
  .lc-num{font-size:34px}
  .tb-logo{font-size:15px}
  .tb-gname{font-size:12px}
  .tb-gsub{font-size:10px}
  .tb-logout{font-size:11px;padding:4px 8px}
  .rfbtn{font-size:10px;padding:4px 9px}
  .update-time{font-size:10px}
  #rbar{padding:5px 10px}
  .bxh-bang{font-size:14px}
}

.live-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r2);
  overflow:hidden;border-top:3px solid var(--or);transition:transform .15s,box-shadow .15s;
  animation:fadeUp .3s ease}
.live-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.lc-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
  background:rgba(245,158,11,.07);border-bottom:1px solid rgba(245,158,11,.12)}
.lc-live-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:800;
  color:var(--or);letter-spacing:1px;background:rgba(245,158,11,.12);padding:3px 8px;border-radius:20px}
.lc-live-badge .dot{width:5px;height:5px;background:var(--or);border-radius:50%;animation:liveDot 1s infinite}
.lc-meta{font-size:11px;color:var(--tx3);font-weight:600}
.lc-body{padding:10px 12px}
.lc-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center}
.lc-team{text-align:center}
/* Mỗi VĐV 1 dòng — dùng flex-column */
.lc-team-name{font-family:var(--fh);font-size:12px;font-weight:700;line-height:1.5;
  margin-bottom:4px;display:flex;flex-direction:column;gap:0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.lc-vdv{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:12px;font-weight:700;line-height:1.4}
.lc-serve{font-size:10px;color:var(--or);font-weight:700;margin-top:2px;height:12px}
.lc-score-wrap{text-align:center}
.lc-num{font-family:var(--fh);font-size:38px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc-num.win{background:linear-gradient(135deg,var(--gn),#86efac);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc-dash{font-family:var(--fh);font-size:13px;color:var(--tx3);margin:0 2px}
.lc-game{font-size:10px;color:var(--tx3);margin-top:3px;font-weight:600}
.lc-ftr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;
  border-top:1px solid var(--bdr);background:rgba(0,0,0,.15)}
.lc-court{font-size:11px;color:var(--ac);font-weight:700}
.lc-court-bar{display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(14,165,233,.12);border-bottom:1px solid rgba(14,165,233,.2);
  padding:5px 12px;font-size:12px;font-weight:800;color:var(--ac)}
.lc-round-tag{font-size:11px;color:var(--or);font-weight:600}

/* ══ BẢNG ĐẤU (SCHEDULE) ══ */
.bang-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);
  overflow:hidden;margin-bottom:10px;animation:fadeUp .25s ease}
.bang-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  user-select:none;transition:background .12s;border-bottom:1px solid var(--bdr)}
.bang-head:hover{background:var(--bg3)}
.bang-head-title{font-family:var(--fh);font-size:16px;font-weight:800;flex:1}
.bang-head-meta{font-size:11px;color:var(--tx3)}
.bang-chevron{font-size:13px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
.bang-chevron.open{transform:rotate(180deg)}
.bang-body{display:none}
.bang-body.open{display:block}
/* FIX v3.28: Smooth transition khi update nội dung — không flash cứng */
.bang-head-meta{transition:color .2s;}
.match-row{transition:background .15s;}

/* trận trong bảng */
.match-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;
  padding:10px 14px;border-bottom:1px solid rgba(27,50,85,.5);transition:background .1s}
.match-row:last-child{border-bottom:none}
.match-row:hover{background:rgba(255,255,255,.03)}
.match-row.live{background:rgba(245,158,11,.05);border-left:3px solid var(--or)}
.match-row.done{opacity:.85}
.mr-team{font-size:12px;font-weight:600;color:var(--tx);line-height:1.4;word-break:break-word;min-width:0}
.mr-team.right{text-align:right}
.mr-team.winner{color:var(--gn);font-weight:800}
.mr-mid{text-align:center;min-width:64px;max-width:90px;flex-shrink:0}
.mr-score{font-family:var(--fh);font-size:22px;font-weight:900;color:var(--tx);letter-spacing:1px;line-height:1}
.mr-score .w{color:var(--gn)}
.mr-vs{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:1px}
.mr-info{font-size:10px;color:var(--tx3);margin-top:3px;line-height:1.3}
.live-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(245,158,11,.15);
  color:var(--or);font-size:9px;font-weight:800;letter-spacing:.5px;padding:2px 6px;
  border-radius:4px;margin-top:2px}
.live-pill .dot{width:4px;height:4px;background:var(--or);border-radius:50%;animation:liveDot 1s infinite}

/* ══ BXH ══ */
.bxh-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);
  overflow:hidden;margin-bottom:10px;animation:fadeUp .25s ease}
.bxh-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  user-select:none;transition:background .12s;border-bottom:1px solid var(--bdr)}
.bxh-head:hover{background:var(--bg3)}
.bxh-bang{font-family:var(--fh);font-size:16px;font-weight:800;flex:1}
.bxh-meta{font-size:11px;color:var(--tx3)}
.bxh-arrow{font-size:13px;color:var(--tx3);transition:transform .2s}
.bxh-arrow.open{transform:rotate(180deg)}
.bxh-body{display:none}
.bxh-body.open{display:block}
.bxh-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:auto}
.bxh-tbl th{padding:5px 4px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--tx3);text-align:center;background:rgba(0,0,0,.2);border-bottom:1px solid var(--bdr);white-space:nowrap}
.bxh-tbl th:first-child,.bxh-tbl td:first-child{text-align:left;padding-left:10px;width:28px}
.bxh-tbl th:nth-child(2),.bxh-tbl td:nth-child(2){text-align:left;max-width:0;width:99%}
.bxh-tbl th:nth-child(n+3),.bxh-tbl td:nth-child(n+3){white-space:nowrap;padding:5px 5px}
.bxh-tbl td{padding:8px 4px;border-bottom:1px solid rgba(27,50,85,.5);text-align:center;vertical-align:middle}
.bxh-tbl tr:last-child td{border-bottom:none}
.bxh-tbl tr.adv td{background:rgba(34,197,94,.05)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border-radius:6px;font-weight:900;font-size:12px;font-family:var(--fh)}
.rank-badge.r1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.rank-badge.r2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#000}
.rank-badge.r3{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.rank-badge.rn{background:var(--bg3);color:var(--tx3)}
.bxh-team{font-weight:600;color:var(--tx);font-size:12px;line-height:1.3;word-break:break-word;display:block}
.adv-tag{font-size:10px;color:var(--gn);font-weight:700;margin-left:3px}
.w-badge{background:rgba(34,197,94,.15);color:var(--gn);font-weight:800;padding:1px 5px;border-radius:8px;font-size:11px;display:inline-block}
.l-badge{background:rgba(239,68,68,.1);color:var(--rd);font-weight:800;padding:1px 5px;border-radius:8px;font-size:11px;display:inline-block}

/* ── SECTION LABEL ── */
.sec-label{font-family:var(--fh);font-size:11px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;padding:12px 0 6px;display:flex;align-items:center;gap:6px}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;
  padding:10px 18px;font-size:13px;color:var(--tx);z-index:999;opacity:0;
  pointer-events:none;transition:all .25s;white-space:nowrap;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:768px){
  .live-grid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .lc-num{font-size:62px}
  .mr-team{font-size:14px}
  #main{padding:16px 20px}
}

/* ══ CÂY THI ĐẤU (BRACKET) ══ */
.bk-bracket{display:flex;flex-direction:row;align-items:stretch;
  padding:0 4px 8px;gap:0;min-width:max-content;width:max-content}
.bk-round{display:flex;flex-direction:column;gap:0;flex-shrink:0;min-width:160px}
.bk-round-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  text-align:center;padding:0 12px 14px;height:38px;display:flex;
  align-items:flex-end;justify-content:center;color:var(--tx3);white-space:nowrap}
.bk-round-label.lbl-sf{color:#34d399}
.bk-round-label.lbl-qf{color:#fb923c}
.bk-round-label.lbl-r16{color:#60a5fa}
.bk-round-label.lbl-final{color:#f59e0b}
.bk-round-label.lbl-3rd{color:#c084fc}
.bk-round-label.lbl-group{color:#818cf8}
.bk-round-slots{display:flex;flex-direction:column;flex:1;justify-content:space-around;gap:0}
.bk-slot{display:flex;flex-direction:column;flex:1;justify-content:center;padding:4px 0}
.bk-card{margin:0 4px;background:var(--bg2);border:1px solid var(--bdr);
  border-left:3px solid var(--bdr2);border-radius:10px;overflow:hidden;transition:border-color .15s}
.bk-card.c-done{border-left-color:#22c55e}
.bk-card.c-live{border-left-color:#f97316;animation:bk-pulse 1.8s ease-in-out infinite}
.bk-card.c-final{border-left-color:#f59e0b}
.bk-card.c-sf{border-left-color:#34d399}
.bk-card.c-qf{border-left-color:#fb923c}
.bk-card.c-3rd{border-left-color:#a78bfa}
.bk-card-hd{display:flex;align-items:center;justify-content:space-between;
  padding:4px 10px;background:var(--bg3);border-bottom:1px solid var(--bdr);
  font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--tx4)}
.bk-live-dot{width:5px;height:5px;border-radius:50%;background:#f97316;
  animation:bk-dot 1s ease-in-out infinite alternate;flex-shrink:0}
.bk-row{display:flex;align-items:center;padding:7px 10px;gap:7px;min-height:34px}
.bk-row+.bk-row{border-top:1px solid var(--bdr)}
.bk-row.r-win{background:rgba(34,197,94,.06)}
.bk-row.r-bye{opacity:.45;background:var(--bg3)}
/* v4: Lucky Loser styles — giống admin */
.bk-row.r-lucky{background:rgba(168,85,247,.08);border-left:2px solid rgba(168,85,247,.6)}

<script>
// ══ CONFIG ══
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzWasb4KravYHNR6Q9d55qevrut8O9Kep80nZKBq4Rj05TA3XhNF-fymIRtr75HRJv6/exec';

// ══ STATE ══
let GS=GAS_URL, USER_NAME='', USER_CODE='', USER_GIAI='', USER_ND='';
let _M=[], _R=[], _L=[], _T=null, _giaiName='';
let _curTab='live', _curNd='', _allNds=[];

// v5: directKO — cache seeds theo nd
const _dkSeedsCache = {}; // { nd: [{seed,team}] }

// v5: đọc mode của nội dung từ _T (Tournaments row, col[9] = ndMode JSON)
function _getNdModePlayer(nd) {
  if (!_T || !nd) return 'group';
  try {
    const raw = String(_T[9]||'').trim();
    if (!raw) return 'group';
    const map = JSON.parse(raw);
    return map[nd] || 'group';
  } catch(e) { return 'group'; }
}

// FIX v3.3: Lưu trạng thái UI để không bị reset khi silentRefresh
const _uiState = {
  // Collapse state của từng bảng đấu: { "BangA": true/false, ... }
  collapsedBangs: new Set(),
  // Scroll position của từng tab
  scrollPos: {},
};

// Lưu scroll position của tab hiện tại
function _saveScrollPos(){
  try{ _uiState.scrollPos[_curTab] = window.scrollY||0; }catch(e){}
}
// Khôi phục scroll position
function _restoreScrollPos(){
  try{
    const y = _uiState.scrollPos[_curTab]||0;
    if(y>0) setTimeout(()=>window.scrollTo(0,y),50);
  }catch(e){}
}

// Lưu trạng thái tab + nd vào sessionStorage
function _saveUiToSession(){
  try{
    sessionStorage.setItem('pb_ui_tab',_curTab);
    sessionStorage.setItem('pb_ui_nd',_curNd);
  }catch(e){}
}
// Khôi phục tab + nd từ sessionStorage
function _restoreUiFromSession(){
  try{
    const t=sessionStorage.getItem('pb_ui_tab');
    const n=sessionStorage.getItem('pb_ui_nd');
    if(t&&['live','schedule','standings','bracket'].includes(t)) _curTab=t;
    if(n) _curNd=n;
  }catch(e){}
}
let _liveTimer=null;
// v37: BracketTree SRV cache
let _bkTreeCache={};     // {nd: {rounds, _overrides, _byeRule, version}}
let _fbPBracketRefGlobal=null; // v4: Firebase /bracketTree listener ref
let _bkTreeVersion=0;    // version của cây đang hiển thị
let _permTimer=null;
let _hardReloadTimer=null; // v3: Hard reload toàn bộ cache mỗi N phút
const REFRESH_SEC=8;          // Cập nhật live/kết quả mỗi 8s
const PERM_CHECK_SEC=20;      // Kiểm tra phân quyền mỗi 20s
const HARD_RELOAD_MIN=5;      // Reload toàn bộ data mỗi 5 phút (phát hiện giải/bảng mới)
const INACTIVITY_MIN=240;     // Tự động đăng xuất sau 4 giờ không hoạt động (240 phút)
const _LAST_ACTIVE_KEY='pb_player_last_active';

// ── Inactivity logout ──
function _touchActive(){
  // Cập nhật thời điểm hoạt động cuối
  try{ localStorage.setItem(_LAST_ACTIVE_KEY, Date.now()); }catch(e){}
}
function _isSessionExpired(){
  try{
    const t=parseInt(localStorage.getItem(_LAST_ACTIVE_KEY)||'0');
    if(!t) return false; // lần đầu, chưa có → không expire
    return (Date.now()-t) > INACTIVITY_MIN*60*1000;
  }catch(e){ return false; }
}
// Lắng nghe mọi tương tác của user → reset inactivity timer
['click','keydown','scroll','touchstart'].forEach(ev=>{
  document.addEventListener(ev, _touchActive, {passive:true});
});
const DATA_VER_KEY='pb_pdata_ver'; // v3: version key để detect admin change
const APP_VER_KEY ='pb_app_ver';   // version token từ Máy chủ — detect cấu trúc giải thay đổi

// ══ UTILS ══
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg,dur=2500){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function setUpdateTime(){
  const d=new Date();
  const t=d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const el=$('update-time');
  if(el)el.textContent='Cập nhật: '+t;
  // v3: Lưu timestamp để tính stale
  try{sessionStorage.setItem('pb_last_upd',Date.now());}catch(e){}
}

// ══ API ══
async function gGet(params,timeout=12000){
  const url=new URL(GS);
  Object.entries(params).forEach(([k,v])=>{if(v!=null&&v!=='')url.searchParams.set(k,v);});
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await fetch(url.toString(),{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(t);
    const d=await r.json();
    _checkAppVersion(d); // detect Máy chủ version change → tự reload data
    return d;
  }catch(e){clearTimeout(t);return {};}
}

// ══ LOGIN ══
function loadSaved(){
  try{
    const s=localStorage.getItem('pb_player_v6');
    if(!s)return false;
    const j=JSON.parse(s);
    if(!j.u||!j.c)return false;
    if(_isSessionExpired()){
      localStorage.removeItem('pb_player_v6');
      localStorage.removeItem(_LAST_ACTIVE_KEY);
      return false;
    }
    GS=j.u; USER_CODE=j.c;
    // KHÔNG lấy USER_GIAI/USER_ND từ cache — luôn lấy từ Máy chủ khi validate
    USER_NAME=''; USER_GIAI=''; USER_ND='';
    return true;
  }catch(e){return false;}
}

async function doLogin(){
  const id=$('login-id').value.trim();
  if(!id){showErr('Vui lòng nhập số điện thoại hoặc mã');return;}
  const btn=$('login-btn');btn.disabled=true;btn.textContent='Đang đăng nhập...';
  hideErr();
  try{
    const phone=id.replace(/\D/g,'');
    const isPhone=phone.length>=8&&phone.length<=12&&/^\d+$/.test(phone);
    const param=isPhone?`&phone=${encodeURIComponent(phone)}`:`&code=${encodeURIComponent(id.toUpperCase())}`;

    // Thử playerInit trước (Máy chủ mới) — nếu không có thì fallback validate (Máy chủ cũ)
    let d=null;
    let usePlayerInit=false;
    try{
      const r1=await fetch(`${GS}?action=playerInit&device=player-web&_t=${Date.now()}${param}`,{cache:'no-store'});
      if(r1.ok){
        const j=await r1.json();
        // playerInit hợp lệ nếu trả valid hoặc reason rõ ràng (không phải "unknown action")
        if(j.valid!==undefined && j.reason!=='unknown_action'){
          d=j; usePlayerInit=true;
        }
      }
    }catch(e1){}

    // Fallback: Máy chủ cũ dùng validate
    if(!d){
      const r2=await fetch(`${GS}?action=validate&device=player-web&_t=${Date.now()}${param}`,{cache:'no-store'});
      if(!r2.ok){showErr('Lỗi kết nối HTTP '+r2.status);btn.disabled=false;btn.textContent='Đăng nhập →';return;}
      d=await r2.json();
    }

    if(!d.valid){showErr(d.reason||'Số điện thoại hoặc mã không đúng');btn.disabled=false;btn.textContent='Đăng nhập →';return;}
    const st=(d.statusRaw||'').toLowerCase();
    if(st==='khóa'||st==='disabled'){showErr('Tài khoản bị khóa');btn.disabled=false;btn.textContent='Đăng nhập →';return;}
    if(d.noGiai||!d.giai?.trim()){showErr('⚠️ Tài khoản chưa được phân giải đấu. Vui lòng liên hệ admin.');btn.disabled=false;btn.textContent='Đăng nhập →';return;}

    USER_NAME=d.name||'';
    USER_CODE=d.code||'';
    USER_GIAI=d.giai||'';
    USER_ND=d.noidung||'';
    localStorage.setItem('pb_player_v6',JSON.stringify({u:GS,c:USER_CODE,n:USER_NAME,g:USER_GIAI,nd:USER_ND}));

    if(usePlayerInit && d.matches){
      _applyPlayerInitData(d); // Máy chủ mới: data có sẵn trong response
      startApp(true);
    } else {
      // Máy chủ cũ: gọi loadAll bình thường
      _clearDataCache();
      startApp(false);
    }
  }catch(e){showErr('Lỗi: '+e.message);btn.disabled=false;btn.textContent='Đăng nhập →';}
}
function showErr(m){const e=$('login-err');e.textContent=m;e.style.display='block';}
function hideErr(){$('login-err').style.display='none';}
function doLogout(){
  if(!confirm('Đăng xuất?'))return;
  localStorage.removeItem('pb_player_v6');
  localStorage.removeItem(_LAST_ACTIVE_KEY); // FIX v3.29: clear inactivity timer
  try{sessionStorage.removeItem('pb_ui_tab');sessionStorage.removeItem('pb_ui_nd');}catch(e){}
  stopRefresh();
  $('app').style.display='none';
  $('login-screen').style.display='flex';
  $('login-id').value='';
  $('login-btn').disabled=false;$('login-btn').textContent='Đăng nhập →';
}

// ══ APP ══
async function startApp(dataAlreadyLoaded){
  $('login-screen').style.display='none';
  $('app').style.display='block';
  _touchActive();
  // Nếu data chưa có (login mới qua doLogin) → gọi playerInit lại
  if(!dataAlreadyLoaded){
    _M=[];_R=[];_L=[];_T=null;_giaiName='';_curNd='';_allNds=[];
    try{await loadAll();}catch(e){console.error('loadAll:',e);}
  }
  _restoreUiFromSession();
  if(_curNd&&!_allNds.includes(_curNd)) _curNd=_allNds[0]||'';
  document.querySelectorAll('.ntab').forEach(b=>b.classList.toggle('on',b.dataset.tab===_curTab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id==='tab-'+_curTab));
  renderNdFilter();
  renderCurrentTab();
  _restoreScrollPos();
  startRefresh();
  // Cập nhật sticky offsets sau khi DOM render xong
  setTimeout(_updateStickyOffsets, 100);
  window.addEventListener('resize', _updateStickyOffsets);
}

const _FB_CFG_P = {
  apiKey:      'AIzaSyAJV0Ojod9lQ4vec-y90l52xX7HUTP-dvA',
  authDomain:  'app-pickleball.firebaseapp.com',
  databaseURL: 'https://app-pickleball-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:   'app-pickleball',
  appId:       '1:462226845907:web:5b451c3c1f624062796426',
};
let _fbPApp = null, _fbPDb = null;
let _fbPLiveRef = null, _fbPResultsRef = null;
let _fbPConnected = false;

function _initPlayerFirebase() {
  try {
    if (typeof firebase === 'undefined') return false;
    if (!_fbPApp) _fbPApp = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(_FB_CFG_P);
    _fbPDb = _fbPApp.database();

    // Listener 1: /liveScores
    _fbPLiveRef = _fbPDb.ref('liveScores');
    _fbPLiveRef.on('value', snap => {
      const data = snap.val();
      _L = [];
      if (data) {
        Object.values(data).forEach(d => {
          if (!d || !d.key || d.status === 'finished') return;
          // Lọc theo giải của player
          // v5 FIX: normalize dấu tiếng Việt khi so sánh tên giải
          if (_giaiName && d.giai) {
            const _ng=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ');
            if(_ng(d.giai)!==_ng(_giaiName))return;
          }
          _L.push([d.key, d.giai||'', d.teamA||'', d.scoreA??0, d.scoreB??0, d.teamB||'',
                   d.server||'', d.game||'Game 1', d.updatedAt||'', d.status||'playing', d.referee||'']);
        });
      }
      if(_curTab==='live') renderLive();
      if(_curTab==='schedule') renderSchedule();
      const lb=document.getElementById('tb-live');if(lb)lb.style.display=_L.length?'flex':'none';
    }, err => { console.warn('[FB Player] liveScores err:', err.message); });

    // Listener 2: /results — kết quả hoàn thành
    _fbPResultsRef = _fbPDb.ref('results');
    _fbPResultsRef.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      let changed = false;
      Object.values(data).forEach(d => {
        if (!d || !d.giai || !d.nd || !d.bang || !d.code) return;
        // v5 FIX: normalize dấu
        if (_giaiName && d.giai) {
          const _ng2=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ');
          if(_ng2(d.giai)!==_ng2(_giaiName))return;
        }
        // Upsert vào _R
        const idx = _R.findIndex(r =>
          String(r[1]||'')===d.giai && String(r[2]||'')===d.nd &&
          String(r[3]||'')===d.bang  && String(r[4]||'')===d.code);
        const row = ['', d.giai, d.nd, d.bang, d.code,
                     d.teamA||'', d.teamB||'', d.scoreA||0, d.scoreB||0,
                     d.winner||'', d.court||'', d.ref||'', ''];
        if (idx >= 0) _R[idx] = row; else { _R.push(row); changed = true; }
        changed = true;
      });
      if (!changed) return;
      if(_curTab==='standings') renderStandings();
      if(_curTab==='schedule')  renderSchedule();
      if(_curTab==='bracket')   renderBracketTab();
    }, err => { console.warn('[FB Player] results err:', err.message); });

    _fbPConnected = true;
    console.log('[FB Player] liveScores + results WebSocket ✅');

    // Listener 3: /matchesVersion — nhận tín hiệu khi admin đổi tên VĐV → reload matches
    let _fbPMatchesVerRef = null;
    let _fbPMatchesVersion = undefined;
    try {
      _fbPMatchesVerRef = _fbPDb.ref('matchesVersion');
      _fbPMatchesVerRef.on('value', snap => {
        const ver = snap.val();
        if (ver === null || ver === undefined) return;
        if (_fbPMatchesVersion !== undefined && ver !== _fbPMatchesVersion) {
          console.log('[FB Player] matchesVersion đổi → reload matches');
          loadAll(); // fetch lại _M với tên đội mới, sau đó re-render tab hiện tại
        }
        _fbPMatchesVersion = ver;
      }, err => { console.warn('[FB Player] matchesVersion err:', err.message); });
    } catch(eMv) { console.warn('[FB Player] matchesVersion listener lỗi:', eMv.message); }

    // Listener 4: /bracketTree — v4 NEW: cây thi đấu realtime (Lucky/BYE đúng ngay)
    let _fbPBracketRef = null;
    try {
      _fbPBracketRef = _fbPDb.ref('bracketTree');
      _fbPBracketRef.on('value', snap => {
        const data = snap.val();
        if (!data) return;
        const gUp = (_giaiName || USER_GIAI || '').trim().toUpperCase();
        Object.values(data).forEach(d => {
          if (!d || !d.giai || !d.nd || !d.rounds) return;
          if (gUp && d.giai.trim().toUpperCase() !== gUp) return;
          // Lưu vào cache — bao gồm _byeRule, _overrides và _dkMode để Lucky/directKO hiển thị đúng
          _bkTreeCache[d.nd] = { ...d, version: d.version || d.ts || 0 };
          console.log('[FB Player bracketTree]', d.nd, 'byeRule:', d._byeRule, 'dkMode:', d._dkMode, 'v:', d.version);
          // Re-render nếu đang xem tab bracket đúng nội dung này
          if (_curTab === 'bracket' && _curNd === d.nd) renderBracketTab();
        });
      }, err => { console.warn('[FB Player] bracketTree err:', err.message); });
      // Lưu ref để off() khi stop
      _fbPBracketRefGlobal = _fbPBracketRef;
    } catch(eBk) { console.warn('[FB Player] bracketTree listener lỗi:', eBk.message); }

    return true;
  } catch(e) {
    console.warn('[FB Player] init lỗi:', e.message);
    return false;
  }
}
function _stopPlayerFirebase() {
  if (_fbPLiveRef)    { try { _fbPLiveRef.off('value');    } catch(e){} _fbPLiveRef    = null; }
  if (_fbPResultsRef) { try { _fbPResultsRef.off('value'); } catch(e){} _fbPResultsRef = null; }
  if (typeof _fbPBracketRefGlobal !== 'undefined' && _fbPBracketRefGlobal) {
    try { _fbPBracketRefGlobal.off('value'); } catch(e){} _fbPBracketRefGlobal = null;
  }
  _fbPConnected = false;
}

function startRefresh(){
  stopRefresh();
  // v50: Firebase thay thế live + results poll — giảm từ 4 request/8s → 1 request/30s
  const fbOk = _initPlayerFirebase();
  // Poll GAS mỗi 30s chỉ để sync matches/tournaments (ít thay đổi)
  // Nếu Firebase không có → fallback poll mỗi 8s như cũ
  _liveTimer = setInterval(()=>silentRefresh(), fbOk ? 30000 : REFRESH_SEC*1000);
  _permTimer = setInterval(()=>checkPermission(), PERM_CHECK_SEC*1000);
  // Hard reload mỗi 10 phút thay vì 5 phút (Firebase xử lý live/results)
  _hardReloadTimer = setInterval(()=>_hardReload(), fbOk ? 600000 : HARD_RELOAD_MIN*60*1000);
}
function stopRefresh(){
  if(_liveTimer){clearInterval(_liveTimer);_liveTimer=null;}
  if(_permTimer){clearInterval(_permTimer);_permTimer=null;}
  if(_hardReloadTimer){clearInterval(_hardReloadTimer);_hardReloadTimer=null;}
  _stopPlayerFirebase();
}

// v3: Xóa toàn bộ cache dữ liệu trận đấu (không xóa session login)
function _clearDataCache(){
  _M=[];_R=[];_L=[];_T=null;_giaiName='';_curNd='';_allNds=[];
  Object.keys(_dkSeedsCache).forEach(k=>delete _dkSeedsCache[k]); // v5: clear directKO cache
  _bkTreeCache={};_bkTreeVersion=0; // v37: xóa bracket tree cache
  try{ sessionStorage.removeItem(DATA_VER_KEY); }catch(e){}
  console.log('[v3] Data cache cleared (incl bracket snapshot)');
}

// ── App version check: Máy chủ trả appVersion trong mọi response ──
// Nếu version thay đổi (admin deploy Máy chủ mới) → clear data cache + reload
let _appVerChecked = false;
function _checkAppVersion(data) {
  if (!data?.appVersion) return;
  try {
    const saved = localStorage.getItem(APP_VER_KEY);
    if (!saved) {
      // Lần đầu — lưu lại, không reload
      localStorage.setItem(APP_VER_KEY, data.appVersion);
      return;
    }
    if (saved !== data.appVersion) {
      console.log('[ver] App version changed:', saved, '→', data.appVersion);
      localStorage.setItem(APP_VER_KEY, data.appVersion);
      if (!_appVerChecked) {
        _appVerChecked = true; // tránh reload loop
        _clearDataCache();
        loadAll().then(() => {
          renderCurrentTab();
          console.log('[ver] Reloaded data after version change');
        }).catch(e => console.warn('[ver] Reload error:', e));
      }
    }
  } catch(e) {}
}

// v3: Hard reload định kỳ — fetch lại toàn bộ từ server, cập nhật cây thi đấu & VĐV
async function _hardReload(){
  if(!GS||!USER_CODE)return;
  console.log('[v3] Hard reload triggered');
  _appVerChecked = false; // reset để sẵn sàng detect version change tiếp theo
  _clearDataCache();
  try{
    await loadAll();
    renderCurrentTab();
    console.log('[v3] Hard reload done — matches:',_M.length);
  }catch(e){ console.warn('[v3] Hard reload error:',e); }
}

async function silentRefresh(){
  try{
    _saveScrollPos(); // lưu scroll trước khi refresh
    await loadAll();
    // FIX v3.3: Update in-place — không xóa innerHTML, không nháy màn hình
    if(_curTab==='bracket'){
      const inner=$('bk-inner');
      if(inner&&_curNd&&_bkTreeCache[_curNd]){
        _bkRenderFromSnapshot(_curNd,_bkTreeCache[_curNd],inner);
      } else {
        renderBracketTab();
      }
    } else if(_curTab==='schedule'){
      renderSchedule(); // smart patch — không nháy
    } else if(_curTab==='standings'){
      renderStandings(); // smart patch — không nháy
    } else if(_curTab==='live'){
      renderLive(); // smart patch — không nháy
    } else {
      renderCurrentTab();
    }
    _restoreScrollPos(); // khôi phục scroll sau khi render
  }catch(e){}
}

// ── Tự động kiểm tra phân quyền & cập nhật giải đấu nếu thay đổi ──
async function checkPermission(){
  if(!GS||!USER_CODE)return;
  try{
    // Dùng validate (luôn có) để kiểm tra phân quyền
    const r=await fetch(`${GS}?action=validate&device=player-web&_t=${Date.now()}&code=${encodeURIComponent(USER_CODE)}`,{cache:'no-store'});
    if(!r.ok)return;
    const d=await r.json();
    if(!d.valid)return;
    const newGiai=(d.giai||'').trim();
    const newNd=(d.noidung||'').trim();
    if(d.name) USER_NAME=d.name;
    // Chỉ reload khi phân quyền thực sự thay đổi
    if(newGiai!==USER_GIAI||newNd!==USER_ND){
      console.log('[checkPermission] Giải thay đổi:',USER_GIAI,'→',newGiai);
      USER_GIAI=newGiai; USER_ND=newNd;
      _giaiName=''; // reset để loadAll resolve lại từ tournaments
      localStorage.setItem('pb_player_v6',JSON.stringify({u:GS,c:USER_CODE,n:USER_NAME,g:USER_GIAI,nd:USER_ND}));
      _clearDataCache();
      await loadAll();
      renderCurrentTab();
      toast('🔄 Giải đấu đã được cập nhật!',3000);
    }
  }catch(e){}
}
async function refreshAll(){
  const btn=$('rf-btn');btn.disabled=true;btn.textContent='⏳';
  try{
    _saveScrollPos();
    await loadAll();
    renderCurrentTab();
    _restoreScrollPos();
    toast('✅ Đã cập nhật');
  }
  finally{btn.disabled=false;btn.textContent='↻ Làm mới';}
}

// ══ LOAD DATA ══
// loadAll chỉ fetch data theo USER_GIAI hiện tại — không validate lại
// Việc cập nhật USER_GIAI mới là của autoLoginFromCache() và checkPermission()
async function loadAll(){
  if(!GS||!USER_CODE)return;
  const giaiToUse=_giaiName||USER_GIAI||'';
  if(!giaiToUse){console.warn('[loadAll] Chưa có giải');return;}
  try{
    const[td,md,rd,ld]=await Promise.all([
      fetch(`${GS}?action=tournaments&_t=${Date.now()}`,{cache:'no-store'}).then(r=>r.json()).catch(()=>({})),
      fetch(`${GS}?action=matches&giai=${encodeURIComponent(giaiToUse)}&_t=${Date.now()}`,{cache:'no-store'}).then(r=>r.json()).catch(()=>({})),
      fetch(`${GS}?action=results&giai=${encodeURIComponent(giaiToUse)}&_t=${Date.now()}`,{cache:'no-store'}).then(r=>r.json()).catch(()=>({})),
      fetch(`${GS}?action=live&code=all&giai=${encodeURIComponent(giaiToUse)}&_t=${Date.now()}`,{cache:'no-store'}).then(r=>r.json()).catch(()=>({})),
    ]);
    if(td.rows?.length>1){
      const gUp=giaiToUse.trim().toUpperCase();
      const found=td.rows.slice(1).find(r=>
        String(r[0]||'').trim().toUpperCase()===gUp||
        String(r[1]||'').trim().toUpperCase()===gUp
      );
      if(found){_T=found;_giaiName=String(found[1]||'').trim();}
    }
    if(md.rows?.length>1)_M=md.rows.slice(1); else _M=[];
    if(rd.rows?.length>1)_R=rd.rows.slice(1); else _R=[];
    if(ld.rows?.length>1)_L=ld.rows.slice(1).filter(r=>String(r[9]||'').toLowerCase()!=='finished');
    else _L=[];
    buildNdList();renderTopBar();renderNdFilter();setUpdateTime();
    const lb=$('tb-live');if(lb)lb.style.display=_L.length?'flex':'none';
    console.log('[loadAll]',_giaiName,'M:',_M.length,'L:',_L.length);
  }catch(e){console.warn('[loadAll]',e);}
}

function buildNdList(){
  // HDR_MATCHES col 0=Giải đấu, 1=Nội dung
  const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
  const allNds=[...new Set(_M
    .filter(m=>{const g=String(m[0]||'').trim().toUpperCase();return !gUp||g===gUp;})
    .map(m=>String(m[1]||'').trim()).filter(Boolean))];
  if(USER_ND&&USER_ND.trim()){
    const allowed=USER_ND.split(',').map(s=>s.trim()).filter(Boolean);
    _allNds=allNds.filter(nd=>allowed.some(a=>nd.toLowerCase()===a.toLowerCase()||nd.includes(a)||a.includes(nd)));
    if(!_allNds.length)_allNds=allowed;
  }else{_allNds=allNds;}
  if(!_curNd||!_allNds.includes(_curNd))_curNd=_allNds[0]||'';
}

function renderTopBar(){
  const name=_T?String(_T[1]||''):USER_GIAI;
  const venue=_T?String(_T[2]||''):'';
  const s=_T?String(_T[4]||''):'',e=_T?String(_T[5]||''):'';
  $('tb-gname').textContent=name||'Giải đấu';
  const fmt=d=>{try{return new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});}catch{return d;}};
  let sub=venue;
  if(s)sub+=(sub?' · ':'')+fmt(s)+(e?' – '+fmt(e):'');
  $('tb-gsub').textContent=sub||USER_NAME;
}

function renderNdFilter(){
  const bar=$('nd-filter-bar');
  if(_allNds.length<=1){bar.style.display='none';_updateStickyOffsets();return;}
  bar.style.display='flex';
  bar.innerHTML=_allNds.map(nd=>{
    const isDk = _getNdModePlayer(nd)==='directKO';
    const label = isDk ? esc(nd)+' <span style="font-size:9px">⚡</span>' : esc(nd);
    return `<button class="nd-chip${nd===_curNd?' on':''}" onclick="selectNd('${esc(nd)}')">${label}</button>`;
  }).join('');
  _updateStickyOffsets();
}
function _updateStickyOffsets(){
  // Tính toán top offset cho rbar dựa trên chiều cao thực tế của các sticky element phía trên
  const topbar=$('topbar'),navtabs=$('navtabs'),ndbar=$('nd-filter-bar');
  let offset=0;
  if(topbar)offset+=topbar.offsetHeight;
  if(navtabs)offset+=navtabs.offsetHeight;
  if(ndbar&&ndbar.style.display!=='none')offset+=ndbar.offsetHeight;
  document.documentElement.style.setProperty('--rbar-top', offset+'px');
  // nd-filter-bar top = topbar + navtabs
  if(ndbar){
    let ndTop=0;
    if(topbar)ndTop+=topbar.offsetHeight;
    if(navtabs)ndTop+=navtabs.offsetHeight;
    ndbar.style.top=ndTop+'px';
  }
}
function selectNd(nd){_curNd=nd;renderNdFilter();renderCurrentTab();_saveUiToSession();}

// ══ HELPERS ══
function getMatches(){
  // HDR_MATCHES: [0]Giải đấu,[1]Nội dung,[2]Bảng,[3]Mã trận,[4]Đội A,[5]ĐiểmA,[6]ĐiểmB,[7]Đội B,[8]Sân,[9]Vòng,[10]GhiChú
  const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
  return _M.filter(m=>{
    const g=String(m[0]||'').trim().toUpperCase();
    const nd=String(m[1]||'').trim();
    const giaiOk=!gUp||g===gUp;
    const ndOk=!_curNd||nd===_curNd;
    return giaiOk&&ndOk;
  });
}

function getResults(){
  // KetQua: [0]time,[1]giai,[2]nd,[3]bang,[4]code,[5]teamA,[6]teamB,[7]sA,[8]sB,[9]winner,[10]court,[11]ref,[12]rule
  const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
  return _R.filter(r=>{
    const g=String(r[1]||'').trim().toUpperCase();
    const nd=String(r[2]||'').trim();
    const giaiOk=!gUp||g===gUp;
    const ndOk=!_curNd||nd===_curNd;
    return giaiOk&&ndOk;
  });
}

function buildResMap(){
  // key = nd|bang|code
  const map=new Map();
  getResults().forEach(r=>{
    const key=String(r[2]||'')+'|'+String(r[3]||'')+'|'+String(r[4]||'');
    map.set(key,{sA:Number(r[7]||0),sB:Number(r[8]||0),winner:String(r[9]||'')});
  });
  return map;
}

function isDone(m,rMap){
  if(!rMap)rMap=buildResMap();
  const key=String(m[1]||'')+'|'+String(m[2]||'')+'|'+String(m[3]||'');
  return rMap.has(key);
}

// v5 FIX: parse live key đúng cả 4 phần "giai|nd|bang|code" lẫn 3 phần "nd|bang|code"
function _parseLiveKey(key) {
  const p = String(key||'').split('|');
  if (p.length >= 4) return { giai:p[0], nd:p[1], bang:p[2], code:p[3] };
  if (p.length === 3) return { giai:'', nd:p[0], bang:p[1], code:p[2] };
  return { giai:'', nd:'', bang:'', code:key };
}
function getLiveByKey(nd,bang,code){
  // v5 FIX: referee key có 4 phần "giai|nd|bang|code", cũ 3 phần "nd|bang|code"
  // So sánh normalize để tránh lệch dấu tiếng Việt
  const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ');
  return _L.find(l=>{
    const {nd:lNd,bang:lBang,code:lCode}=_parseLiveKey(l[0]);
    return norm(lCode)===norm(code) && norm(lBang)===norm(bang) && norm(lNd)===norm(nd);
  })||null;
}

// ══ RENDER LIVE ══
// HDR_LIVE: [0]Key,[1]Giải đấu,[2]Đội A,[3]Điểm A,[4]Điểm B,[5]Đội B,[6]Giao bóng,[7]Game,[8]Cập nhật,[9]Trạng thái
function renderLive(){
  const wrap=$('live-content');
  const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
  const _normNd=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ');
  const liveRows=_L.filter(l=>{
    const lg=String(l[1]||'').trim().toUpperCase();
    if(gUp&&lg&&lg!==gUp)return false;
    if(_curNd){
      // v5 FIX: parse nd đúng từ key 4 phần "giai|nd|bang|code" hoặc 3 phần "nd|bang|code"
      const {nd:lNd}=_parseLiveKey(l[0]);
      if(lNd&&_normNd(lNd)!==_normNd(_curNd))return false;
    }
    return true;
  });

  const _buildCard=(l)=>{
    const key=String(l[0]||'');
    // v5 FIX: parse đúng cả 4 phần "giai|nd|bang|code" lẫn 3 phần cũ "nd|bang|code"
    const {nd,bang,code}=_parseLiveKey(key);
    const tA=String(l[2]||'—'),tB=String(l[5]||'—');
    const sA=Number(l[3]||0),sB=Number(l[4]||0);
    const serve=String(l[6]||''),game=String(l[7]||'');
    const aWin=sA>sB,bWin=sB>sA;
    const mInfo=_M.find(m=>String(m[3]||'')===code&&String(m[2]||'')===bang)||null;
    const court=mInfo?String(mInfo[8]||''):'';
    const round=mInfo?String(mInfo[9]||''):'';
    // Render mỗi VĐV trên 1 dòng riêng
    const fmtVdv=t=>{
      const parts=t.split(' - ');

    };
    // Bỏ prefix "Game " (data="Game 1" → hiện số game)
    const gameLabel=game?game.replace(/^Game\s+/i,'').trim():'';
    return {key, html:`<div class="lc-hdr">
        <div class="lc-live-badge"><div class="dot"></div>LIVE</div>
        <div class="lc-meta">${esc(bang||nd)}${round?' · '+esc(round):''}</div>
      </div>
      ${court?`<div class="lc-court-bar">🏸 ${esc(court)}</div>`:''}
      <div class="lc-body"><div class="lc-scoreboard">
        <div class="lc-team">
          <div class="lc-team-name">${fmtVdv(tA)}</div>
          <div class="lc-serve">${serve==='A'?'🟡 Giao bóng':''}</div>
        </div>

            <span class="lc-num${aWin?' win':''}">${sA}</span>

            <span class="lc-num${bWin?' win':''}">${sB}</span>
          </div>
          ${gameLabel?`<div class="lc-game">Game ${esc(gameLabel)}</div>`:''}
        </div>
        <div class="lc-team">
          <div class="lc-team-name">${fmtVdv(tB)}</div>
          <div class="lc-serve">${serve==='B'?'🟡 Giao bóng':''}</div>
        </div>
      </div></div>
      ${!court?'<div class="lc-ftr"><div class="lc-round-tag">'+esc(round)+'</div></div>':''}`};
  };

  // FIX v3.31: Smart patch — không replace toàn bộ innerHTML (tránh nháy)
  if(!liveRows.length){
    // Không có trận live → hiện empty state (chỉ update nếu chưa hiện)
    const empMsg='Hiện không có trận nào đang thi đấu';
    const existing=wrap.querySelector('.empty-msg');
    if(existing&&existing.textContent===empMsg)return; // đã đúng rồi
    wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">🏓</div>
      <div class="empty-msg">${empMsg}</div>
      <div class="empty-sub">Tự động cập nhật mỗi ${REFRESH_SEC}s</div></div>`;
    return;
  }

  // Lấy danh sách live-card hiện có trong DOM
  const existingCards=wrap.querySelectorAll('.live-card');

  existingCards.forEach(card=>{ const k=card.dataset.key; if(k)existingByKey.set(k,card); });

  // Số trận thay đổi → full render một lần
  if(existingCards.length!==liveRows.length){
    wrap.innerHTML=`<div class="live-grid" style="margin-top:4px">${liveRows.map(l=>{
      const {key,html}=_buildCard(l);
      return `<div class="live-card" data-key="${esc(key)}">${html}</div>`;
    }).join('')}</div>`;
    return;
  }

  // Patch in-place từng card — chỉ update nội dung nếu thay đổi
  liveRows.forEach(l=>{
    const {key,html}=_buildCard(l);
    const card=existingByKey.get(key);
    if(card){
      if(card.innerHTML!==html)card.innerHTML=html;
    }
  });
}

// ══ RENDER SCHEDULE (Lịch đấu = tất cả bảng + trận) ══
function renderSchedule(){
  const wrap=$('schedule-content');
  const matches=getMatches();
  if(!matches.length){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">Không có trận nào</div></div>';
    return;
  }
  const rMap=buildResMap();
  const liveKeys=new Set(_L.map(l=>String(l[0]||'')));

  const byBang=new Map();
  matches.forEach(m=>{
    const b=String(m[2]||'Khác');
    if(!byBang.has(b))byBang.set(b,[]);
    byBang.get(b).push(m);
  });

  const KO=['Tứ kết','Bán kết','Chung kết','Hạng 3','Vòng 16','TK','BK','CK','H3'];
  const isKo=n=>KO.some(k=>n.startsWith(k)||n.includes(k));
  const KO_ORDER=['Vòng 16','Tứ kết','Bán kết','Hạng 3','Chung kết'];
  const koRank=n=>{const i=KO_ORDER.findIndex(k=>n.startsWith(k)||n===k);return i<0?99:i;};
  const sorted=[...byBang.keys()].sort((a,b)=>{
    const aKo=isKo(a),bKo=isKo(b);
    if(!aKo&&bKo)return -1;
    if(aKo&&!bKo)return 1;
    if(aKo&&bKo)return koRank(a)-koRank(b);
    return a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'});
  });

  // ── FIX v3.28: Smart patch — KHÔNG replace innerHTML toàn bộ, chỉ update phần thay đổi ──
  // Build HTML mới cho từng bang, so sánh với DOM hiện tại → chỉ patch nếu khác
  const _buildBangHTML=(bang)=>{
    const ms=byBang.get(bang);
    const doneCount=ms.filter(m=>isDone(m,rMap)).length;
    const liveCount=ms.filter(m=>{
      const key=String(m[1]||'')+'|'+String(m[2]||'')+'|'+String(m[3]||'');
      return liveKeys.has(key)||liveKeys.has(String(m[3]||''));
    }).length;
    const meta=`${ms.length} trận${liveCount?' · <span style="color:var(--rd)">'+liveCount+' live</span>':''}${doneCount?' · <span style="color:var(--gn)">'+doneCount+' xong</span>':''}`;
    const rows=ms.map(m=>{
      const nd=String(m[1]||''),bang2=String(m[2]||''),code=String(m[3]||'');
      const tA=String(m[4]||'').trim()||'TBD',tB=String(m[7]||'').trim()||'TBD';
      const court=String(m[8]||''),round=String(m[9]||'');
      const matchTimeRaw=String(m[11]||'').trim(); // giờ thi đấu col[11]
      // Format: Máy chủ trả về HH:MM string đúng (đã fix ở Máy chủ v40)
      // Fallback: nếu vẫn còn ISO (data cũ) → parse UTC rồi cộng +7h (UTC+7)
      const fmtMatchTime=(v)=>{
        if(!v)return'';
        // ISO còn sót: "1899-12-30T01:08:30.000Z" → +7h về VN
        const iso=v.match(/T(\d{2}):(\d{2})/);
        if(iso){
          const totalMin=parseInt(iso[1],10)*60+parseInt(iso[2],10)+420;
          const h=Math.floor(totalMin/60)%24,mi=totalMin%60;
          return h+':'+String(mi).padStart(2,'0');
        }
        // HH:MM bình thường → bỏ số 0 đầu: "08:15" → "8:15"
        const hm=v.match(/^(\d{1,2}):(\d{2})/);
        if(hm)return parseInt(hm[1],10)+':'+hm[2];
        return v;
      };
      const matchTime=fmtMatchTime(matchTimeRaw);
      const fullKey=nd+'|'+bang2+'|'+code;
      const isLive=liveKeys.has(fullKey)||liveKeys.has(code);
      const done2=isDone(m,rMap);
      const res=done2?rMap.get(fullKey):null;
      const lRow=isLive?getLiveByKey(nd,bang2,code):null;
      const sA=res?res.sA:(lRow?Number(lRow[3]||0):'');
      const sB=res?res.sB:(lRow?Number(lRow[4]||0):'');
      const aW=res&&Number(res.sA)>Number(res.sB),bW=res&&Number(res.sB)>Number(res.sA);
      const status=isLive?'live':done2?'done':'pending';
      let mid='';
      if(isLive||done2){
        mid=`<div class="mr-score"><span class="${aW?'w':''}">${sA}</span><span style="color:var(--tx3);margin:0 2px;font-size:14px">–</span><span class="${bW?'w':''}">${sB}</span></div>`;
        if(isLive)mid+=`<div class="live-pill"><div class="dot"></div>LIVE</div>`;
      }else{
        mid=`<div class="mr-vs">VS</div>`;
      }
      const fmtT=t=>esc(t).replace(' - ','<br>');
      return `<div class="match-row ${status}">
        <div class="mr-team${aW?' winner':''}">${fmtT(tA)}</div>
        <div class="mr-mid">${mid}<div class="mr-info">${matchTime?`<span style="color:var(--or);font-weight:700;font-family:var(--mo)">${esc(matchTime)}</span>${court||round?' · ':''}`:''}${court?esc(court):''}${round?' · '+esc(round):''}</div></div>
        <div class="mr-team right${bW?' winner':''}">${fmtT(tB)}</div>
      </div>`;
    }).join('');
    return {meta, rows};
  };

  // Lấy danh sách bang-card hiện có trong DOM
  const existingCards=wrap.querySelectorAll('.bang-card');
  const existingByName=new Map();
  existingCards.forEach(card=>{
    const title=card.querySelector('.bang-head-title');
    const name=title?title.textContent.trim().replace(/^🏆\s*/,''):'';
    if(name) existingByName.set(name,card);
  });

  // Nếu số bảng thay đổi → full render một lần (hiếm xảy ra)
  if(existingCards.length!==sorted.length){
    const isCollapsed=bang=>_uiState.collapsedBangs.has(bang.trim().replace(/^🏆\s*/,''));
    wrap.innerHTML=sorted.map(bang=>{
      const {meta,rows}=_buildBangHTML(bang);
      const col=isCollapsed(bang);
      return `<div class="bang-card" data-bang="${esc(bang)}">
        <div class="bang-head" onclick="toggleBang(this)">
          <div class="bang-head-title">${isKo(bang)?'🏆 ':''} ${esc(bang)}</div>
          <div class="bang-head-meta">${meta}</div>
          <div class="bang-chevron${col?'':' open'}">▾</div>
        </div>
        <div class="bang-body${col?'':' open'}">${rows}</div>
      </div>`;
    }).join('');
    return;
  }

  // Số bảng không đổi → patch in-place từng bảng (KHÔNG nháy màn hình)
  sorted.forEach(bang=>{
    const {meta,rows}=_buildBangHTML(bang);
    const card=existingByName.get(bang);
    if(!card) return; // không tìm thấy → bỏ qua

    // Chỉ update meta nếu thay đổi
    const metaEl=card.querySelector('.bang-head-meta');
    if(metaEl&&metaEl.innerHTML!==meta) metaEl.innerHTML=meta;

    // Chỉ update body (match rows) nếu thay đổi
    const body=card.querySelector('.bang-body');
    if(body&&body.innerHTML!==rows) body.innerHTML=rows;
    // Không đụng vào collapse state → người dùng không bị mất vị trí
  });
}

function toggleBang(head){
  const body=head.nextElementSibling;
  const chev=head.querySelector('.bang-chevron');
  const open=body.classList.toggle('open');
  if(chev)chev.classList.toggle('open',open);
  // FIX v3.3: Lưu trạng thái collapse để giữ nguyên khi refresh
  const title=head.querySelector('.bang-head-title');
  const bangName=title?title.textContent.trim().replace(/^🏆\s*/,''):'';
  if(bangName){
    if(open) _uiState.collapsedBangs.delete(bangName);
    else _uiState.collapsedBangs.add(bangName);
  }
}

      ts[tA].played++;ts[tB].played++;
      ts[tA].pf+=sA;ts[tA].pa+=sB;
      ts[tB].pf+=sB;ts[tB].pa+=sA;
      if(sA>sB){ts[tA].won++;ts[tB].lost++;}
      else if(sB>sA){ts[tB].won++;ts[tA].lost++;}
    });
    // FIX: Nếu chưa có kết quả → lấy danh sách đội từ _M (teamA, teamB)
    if(!Object.keys(ts).length){
      const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
      _M.filter(m=>{

      const {meta,tbody}=_buildBxhCard(bang);

            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  } else {

    sortedBangs.forEach(bang=>{
      const {meta,tbody}=_buildBxhCard(bang);
      const card=bxhByName.get(bang);

    });
