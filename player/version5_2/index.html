// ══ BRACKET (CÂY THI ĐẤU) ══

function _ceil2(n){let p=1;while(p<n)p*=2;return p;}

function _bkCalcSeeds(nd){
  const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
  const allM=_M.filter(m=>String(m[0]||'').trim().toUpperCase()===gUp&&String(m[1]||'')===nd);
  const bangM=allM.filter(m=>{const v=String(m[9]||'');return !v||v==='Vòng bảng'||v.includes('bảng');});
  const bangs=[...new Set(bangM.map(m=>String(m[2]||'')).filter(Boolean))].sort();
  const seeds={};const bangDone={};
  bangs.forEach(bang=>{
    const bm=bangM.filter(m=>String(m[2]||'')===bang);
    const table={};let doneCount=0;
    bm.forEach(m=>{
      const tA=String(m[4]||''),tB=String(m[7]||'');
      if(!tA||!tB)return;
      if(!table[tA])table[tA]={team:tA,won:0,lost:0,pf:0,pa:0,played:0};
      if(!table[tB])table[tB]={team:tB,won:0,lost:0,pf:0,pa:0,played:0};
      // Lấy điểm từ KetQua sheet (_R)
      const rKey=nd+'|'+bang+'|'+String(m[3]||'');
      const res=_R.find(r=>String(r[2]||'')+'|'+String(r[3]||'')+'|'+String(r[4]||'')===nd+'|'+bang+'|'+String(m[3]||'')||
        (String(r[2]||'')===nd&&String(r[3]||'')===bang&&(String(r[4]||'')===String(m[3]||'')||
        (String(r[5]||'')===tA&&String(r[6]||'')===tB)||(String(r[5]||'')===tB&&String(r[6]||'')===tA))));
      // Check điểm trong _M (col 5,6)
      const sAm=m[5],sBm=m[6];
      const hasScoreM=(sAm!==''&&sAm!==null&&sAm!==undefined)&&(sBm!==''&&sBm!==null&&sBm!==undefined);
      if(!hasScoreM&&!res)return;
      doneCount++;
      let sA,sB;
      if(hasScoreM){sA=Number(sAm)||0;sB=Number(sBm)||0;}
      else{sA=Number(res[7]||0);sB=Number(res[8]||0);}
      table[tA].pf+=sA;table[tA].pa+=sB;table[tA].played++;
      table[tB].pf+=sB;table[tB].pa+=sA;table[tB].played++;
      if(sA>sB){table[tA].won++;table[tB].lost++;}
      else if(sB>sA){table[tB].won++;table[tA].lost++;}
    });
    const sorted=Object.values(table).sort((a,b)=>(b.won-a.won)||((b.pf-b.pa)-(a.pf-a.pa))||(b.pf-a.pf));
    sorted.forEach((s,i)=>{s.rank=i+1;});
    seeds[bang]=sorted;
    bangDone[bang]=doneCount===bm.filter(m=>String(m[4]||'')&&String(m[7]||'')).length&&bm.length>0;
  });
  return {seeds,bangs,bangDone};
}
// FIX v3: Tra cứu tên đội thực từ seedCode (VD: "2I" → nhì bảng I)
// Dùng để re-resolve khi override lưu seedCode nhưng team rỗng (bảng chưa xong lúc lưu)
function _bkLookupSeedCode(nd, code) {
  const mc = (code||'').trim().match(/^([1-4])([A-Z])$/i);
  if (!mc) return null;
  const rank = parseInt(mc[1]);
  const bangChar = mc[2].toUpperCase();
  const {seeds, bangs, bangDone} = _bkCalcSeeds(nd);
  const bangKey = bangs.find(b =>
    b === bangChar || b.toUpperCase() === bangChar ||
    b.replace(/^Bảng\s+/i,'').trim().toUpperCase() === bangChar
  );
  if (!bangKey || !bangDone?.[bangKey]) return null;
  const st = seeds[bangKey];
  if (!st) return null;
  const entry = st.find(x => x.rank === rank);
  return entry ? entry.team : null;
}


function _bkGlobalSeeding(seeds,bangs){
  const winners=[],runners=[];
  bangs.forEach(bang=>{
    const st=seeds[bang]||[];
    const w=st.find(x=>x.rank===1);
    const r=st.find(x=>x.rank===2);
    winners.push(w?{...w,bang,seedRank:1}:{bang,seedRank:1,won:0,pf:0,pa:0,team:'',isPlaceholder:true});
    runners.push(r?{...r,bang,seedRank:2}:{bang,seedRank:2,won:0,pf:0,pa:0,team:'',isPlaceholder:true});
  });
  return [...winners,...runners];
}

function _bkCrossSeededSlots(globalSeeds,bangs,seeds){
  const nb=bangs?bangs.length:Math.round(globalSeeds.length/2);
  const cap=_ceil2(nb*2);const half=cap/4;
  const byBang={};
  globalSeeds.forEach(s=>{if(!byBang[s.bang])byBang[s.bang]={};if(s.seedRank===1)byBang[s.bang].w=s;else byBang[s.bang].r=s;});
  const bangList=bangs?[...bangs]:[...new Set(globalSeeds.map(s=>s.bang))].slice(0,nb);
  const W=i=>byBang[bangList[i]]?.w??null;
  const R=i=>byBang[bangList[i]]?.r??null;
  const numByes=cap-nb*2;const numWinnerByes=Math.min(numByes,nb);
  const raw1=[],raw2=[];
  for(let i=0;i<nb;i++){if(i%2===0){raw1.push(W(i));raw2.push(R(i));}else{raw1.push(R(i));raw2.push(W(i));}}
  const buildBranch=(rawArr)=>{
    const byeSlots=[],regular=[];
    rawArr.forEach(seed=>{
      const bi=bangList.indexOf(seed?.bang??'');
      if(bi>=0&&bi<numWinnerByes&&seed?.seedRank===1)byeSlots.push(seed);
      else regular.push(seed);
    });
    const regW=regular.filter(x=>x?.seedRank===1);
    const regR=regular.filter(x=>x?.seedRank===2);
    const paired=[];const usedR=new Set();
    regW.forEach(w=>{const match=regR.find(r=>!usedR.has(r.bang)&&r.bang!==w.bang);if(match){usedR.add(match.bang);paired.push({top:w,bot:match});}else paired.push({top:w,bot:null});});
    const leftR=regR.filter(r=>!usedR.has(r.bang));
    for(let k=0;k<leftR.length;k+=2)paired.push({top:leftR[k],bot:leftR[k+1]??null});
    const slots=[...byeSlots.map(s=>({top:s,bot:null})),...paired];
    while(slots.length<half)slots.push({top:null,bot:null});
    return slots.slice(0,half);
  };
  const slots1=buildBranch(raw1),slots2=buildBranch(raw2);
  const slotMap=new Array(cap+1).fill(null);
  slots1.forEach((s,mi)=>{slotMap[mi*2+1]=s.top;slotMap[mi*2+2]=s.bot;});
  slots2.forEach((s,mi)=>{const base=half+mi;slotMap[base*2+1]=s.top;slotMap[base*2+2]=s.bot;});
  return{slotMap,cap};
}

function _bkGetMatchScore(nd,bang,code){
  // Check _M first (col 5,6)
  const m=_M.find(m2=>String(m2[1]||'')===nd&&String(m2[2]||'')===bang&&String(m2[3]||'')===code);
  if(m){const sA=m[5],sB=m[6];if((sA!==''&&sA!=null)&&(sB!==''&&sB!=null))return{scoreA:Number(sA),scoreB:Number(sB),teamA:String(m[4]||''),teamB:String(m[7]||'')};}
  // Check _R (KetQua)
  const r=_R.find(r2=>String(r2[2]||'')===nd&&String(r2[3]||'')===bang&&String(r2[4]||'')===code);
  if(r)return{scoreA:Number(r[7]||0),scoreB:Number(r[8]||0),teamA:String(r[5]||''),teamB:String(r[6]||'')};
  return null;
}

function _bkMatchDone(nd,bang,code){
  const key=nd+'|'+bang+'|'+code;
  if(_L.find(l=>String(l[0]||'')===key))return false; // live = not done
  const m=_M.find(m2=>String(m2[1]||'')===nd&&String(m2[2]||'')===bang&&String(m2[3]||'')===code);
  if(m&&m[5]!==''&&m[5]!=null&&m[6]!==''&&m[6]!=null)return true;
  return !!_R.find(r=>String(r[2]||'')===nd&&String(r[3]||'')===bang&&String(r[4]||'')===code);
}

function _bkIsLive(nd,bang,code){
  const key=nd+'|'+bang+'|'+code;
  return !!_L.find(l=>String(l[0]||'')===key||String(l[0]||'')===code);
}

function _bkNdPrefix(nd){
  if(!nd)return'';
  const norm=nd.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/gi,'d').replace(/[^a-zA-Z0-9\s]/g,'').trim().toUpperCase();
  const words=norm.split(/\s+/).filter(Boolean);
  let pfx;
  if(!words.length)pfx='ND';
  else if(words.length===1)pfx=words[0].slice(0,5);
  else if(words.length===2)pfx=words[0].slice(0,3)+words[1].slice(0,3);
  else pfx=words.slice(0,5).map(w=>w[0]).join('');
  return pfx.slice(0,6)+'_';
}

function _bkBuildAndRenderTree(nd,wrap){
  // v5: directKO không có BXH vòng bảng → không thể build local
  if(_getNdModePlayer(nd)==='directKO'){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Cây thi đấu chưa được tạo</div><div class="empty-sub">Admin cần vào tab Cây thi đấu → Tạo cây → Áp dụng & Tạo lịch</div></div>';
    return;
  }
  const gUp=(_giaiName||USER_GIAI||'').toUpperCase();
  const allM=_M.filter(m=>String(m[0]||'').trim().toUpperCase()===gUp&&String(m[1]||'')===nd);
  const koMatches=allM.filter(m=>{const v=String(m[9]||'');return v&&v!=='Vòng bảng'&&!v.includes('bảng');});
  const {seeds,bangs,bangDone}=_bkCalcSeeds(nd);

  if(!bangs.length&&!koMatches.length){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Chưa có dữ liệu cây thi đấu</div><div class="empty-sub">Vòng KO chưa được tạo cho nội dung này</div></div>';
    return;
  }

  const globalSeeds=_bkGlobalSeeding(seeds,bangs);
  const nb=bangs.length;
  if(!nb){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">Chưa có vòng bảng</div></div>';return;}

  const {slotMap,cap}=_bkCrossSeededSlots(globalSeeds,bangs,seeds);
  const rounds2=Math.log2(cap);
  const ndPfx=_bkNdPrefix(nd);

  const roundName=(ff)=>{if(ff===0)return'Chung kết';if(ff===1)return'Bán kết';if(ff===2)return'Tứ kết';return'Vòng '+Math.pow(2,ff+1);};
  const roundCls=(ff)=>{if(ff===0)return'bk-ck';if(ff===1)return'bk-bk';if(ff===2)return'bk-tk';return'bk-vg';};
  // v3: Không dùng ndPfx — dùng cùng format với admin (CK, BK, TK, V16, V32...)
  const prefix=(ff,nM)=>{if(ff===0)return'CK';if(ff===1)return'BK';if(ff===2)return'TK';return'V'+Math.pow(2,ff+1);};
  const rnArr=['Nhất','Nhì','Ba','Tư'];
  const bangShort=(b)=>b?b.replace(/^Bảng\s+/i,'').trim():b;

  const koByCode={};
  koMatches.forEach(m=>{koByCode[String(m[3]||'')]=m;});
  // v4: đọc _byeRule và overrides từ cache để hiển thị Lucky đúng
  const _snapCached = _bkTreeCache[nd] || {};
  const _byeRule    = _snapCached._byeRule || 'bye';
  const _ov_build   = _snapCached._overrides || {};

  const getWinnerFromKo=(code)=>{
    const sheetM=koByCode[code];
    if(sheetM){
      const bang2=String(sheetM[2]||'');
      if(_bkMatchDone(nd,bang2,code)){
        const fs=_bkGetMatchScore(nd,bang2,code);
        if(fs)return fs.scoreA>fs.scoreB?String(sheetM[4]||''):String(sheetM[7]||'');
      }
    }
    return'';
  };
  const getLoserFromKo=(code)=>{
    const sheetM=koByCode[code];
    if(!sheetM)return'';
    const bang2=String(sheetM[2]||'');
    if(!_bkMatchDone(nd,bang2,code))return'';
    const fs=_bkGetMatchScore(nd,bang2,code);
    if(!fs)return'';
    return fs.scoreA>fs.scoreB?String(sheetM[7]||''):String(sheetM[4]||'');
  };

  const _byeMap={};
  const roundMatches=[];
  for(let r=0;r<rounds2;r++){
    const fromFin=rounds2-1-r;
    const nM=cap/Math.pow(2,r+1);
    const pfx=prefix(fromFin,nM);
    const matches=[];
    // v3: Zero-pad khi nM>=10 để sort đúng (V3201..V3216 thay vì V321..V3216)
    const padLen=nM>9?String(nM).length:0;
    for(let i=0;i<nM;i++){
      const idx=i+1;
      const idxStr=padLen>0?String(idx).padStart(padLen,'0'):String(idx);
      const code=nM===1?pfx:pfx+idxStr;
      if(r===0){
        const slotT=i*2+1,slotB=i*2+2;
        const sT=slotMap[slotT]||null,sB2=slotMap[slotB]||null;
        const byeT=!sT,byeB=!sB2;
        const labelT=byeT?'BYE':`${rnArr[sT.seedRank-1]||('#'+sT.seedRank)} Bảng ${bangShort(sT.bang)}`;
        const labelB=byeB?'BYE':`${rnArr[sB2.seedRank-1]||('#'+sB2.seedRank)} Bảng ${bangShort(sB2.bang)}`;
        const teamA=byeT?'':(sT&&!sT.isPlaceholder&&bangDone?.[sT.bang]?(sT.team||''):'');
        const teamB=byeB?'':(sB2&&!sB2.isPlaceholder&&bangDone?.[sB2.bang]?(sB2.team||''):'');
        matches.push({code,seedA:labelT,seedB:labelB,teamA,teamB,isByeA:byeT,isByeB:byeB,fromFin});
        if(byeT||byeB)_byeMap[code]={byeA:byeT,byeB:byeB};
      }else{
        const prevNM=nM*2;
        const prevPfx=prefix(fromFin+1,prevNM);
        const prevPadLen=prevNM>9?String(prevNM).length:0;
        const _zp2=(n,tot)=>tot>9?String(n).padStart(String(tot).length,'0'):String(n);
        const codeA=prevNM===1?prevPfx:prevPfx+_zp2(i*2+1,prevNM);
        const codeB=prevNM===1?prevPfx:prevPfx+_zp2(i*2+2,prevNM);
        // Auto-advance from BYE
        let tA=getWinnerFromKo(codeA),tB=getWinnerFromKo(codeB);
        // BYE auto-advance
        const byeA=_byeMap[codeA];
        if(!tA&&byeA){const prev=roundMatches[r-1]?.matches.find(m2=>m2.code===codeA);if(prev){if(prev.isByeA&&prev.teamB)tA=prev.teamB;else if(prev.isByeB&&prev.teamA)tA=prev.teamA;}}
        const byeB2=_byeMap[codeB];
        if(!tB&&byeB2){const prev=roundMatches[r-1]?.matches.find(m2=>m2.code===codeB);if(prev){if(prev.isByeA&&prev.teamB)tB=prev.teamB;else if(prev.isByeB&&prev.teamA)tB=prev.teamA;}}
        matches.push({code,fromFin,seedA:`Thắng ${codeA}`,seedB:`Thắng ${codeB}`,teamA:tA,teamB:tB});
      }
    }
    roundMatches.push({name:roundName(fromFin),cls:roundCls(fromFin),matches,fromFin});
  }
  // Hạng 3
  if(rounds2>=2){
    const bkCount=cap/4;
    const bk1=bkCount===1?'BK':'BK1';
    const bk2=bkCount===1?'BK':'BK2';
    roundMatches.push({name:'Hạng 3',cls:'bk-h3',fromFin:-1,matches:[{code:'H3',seedA:`Thua ${bk1}`,seedB:`Thua ${bk2}`,teamA:getLoserFromKo(bk1),teamB:getLoserFromKo(bk2)}]});
  }

  // ── Render helpers ──
  const pillCls=(seedStr)=>{
    if(!seedStr)return'p-num';if(seedStr.startsWith('Thắng')||seedStr==='W')return'p-w';
    if(seedStr.startsWith('BYE'))return'p-bye';
    const shortM=seedStr.match(/^[1-4]([A-Z])$/i);if(shortM)return'p-'+shortM[1].toUpperCase();
    const bangM2=seedStr.match(/Bảng\s+([A-Z])/i);if(bangM2)return'p-'+bangM2[1].toUpperCase();
    return'p-num';
  };
  const pillLabel=(seedStr)=>{
    if(!seedStr)return'?';if(seedStr.startsWith('Thắng'))return'W';if(seedStr==='BYE')return'BYE';
    if(/^[1-4][A-Z]$/i.test(seedStr.trim()))return seedStr.trim().toUpperCase();
    const rank=seedStr.includes('Nhất')?1:seedStr.includes('Nhì')?2:seedStr.includes('Ba')?3:seedStr.includes('Tư')?4:0;
    const bangM2=seedStr.match(/Bảng\s+([A-Z])/i);const bang2=bangM2?bangM2[1].toUpperCase():'';
    if(rank&&bang2)return rank+bang2;return'?';
  };

  // v4 FIX: mkCard trong _bkBuildAndRenderTree hỗ trợ Lucky giống admin
  const mkCard=(m,done,live,fs,mc)=>{
    const tA=m.teamA||'',tB=m.teamB||'';
    const winA=fs&&fs.scoreA>fs.scoreB,winB=fs&&fs.scoreB>fs.scoreA;
    const cardCls='bk-card'+(done?' c-done':'')+(live?' c-live':'')+(mc?' '+mc:'');
    const _ov_m=_ov_build[m.code]||{};
    const luckyPickedA=m.isByeA&&_ov_m.byeAOverridden&&tA;
    const luckyPickedB=m.isByeB&&_ov_m.byeBOverridden&&tB;
    const isLuckySlotA=m.isByeA&&(_byeRule==='lucky'||_ov_m.byeModeA==='lucky')&&!luckyPickedA;
    const isLuckySlotB=m.isByeB&&(_byeRule==='lucky'||_ov_m.byeModeB==='lucky')&&!luckyPickedB;
    const rA=m.isByeA?(luckyPickedA?'':isLuckySlotA?'r-lucky':'r-bye'):(!tA?'r-tbd':winA?'r-win':'');
    const rB=m.isByeB?(luckyPickedB?'':isLuckySlotB?'r-lucky':'r-bye'):(!tB?'r-tbd':winB?'r-win':'');
    const nA=m.isByeA?(luckyPickedA?(tA||'—'):isLuckySlotA?'🍀 Lucky':'BYE'):(tA||'—');
    const nB=m.isByeB?(luckyPickedB?(tB||'—'):isLuckySlotB?'🍀 Lucky':'BYE'):(tB||'—');
    // v4 FIX: Lucky slot chưa chọn đội → pill hiện '🍀' thay vì 'BYE'
    const plA=luckyPickedA?(_ov_m.luckyLabelA||'🍀'):isLuckySlotA?'🍀':pillLabel(m.seedA||'');
    const plB=luckyPickedB?(_ov_m.luckyLabelB||'🍀'):isLuckySlotB?'🍀':pillLabel(m.seedB||'');
    const pcA=isLuckySlotA?'p-lucky':pillCls(m.seedA||'');
    const pcB=isLuckySlotB?'p-lucky':pillCls(m.seedB||'');
    const scA=fs?`<div class="bk-sbox${winA?' s-win':''}">${fs.scoreA}</div>`:'<div class="bk-sbox s-empty">—</div>';
    const scB=fs?`<div class="bk-sbox${winB?' s-win':''}">${fs.scoreB}</div>`:'<div class="bk-sbox s-empty">—</div>';
    return `<div class="${cardCls}">
      <div class="bk-card-hd"><span>${m.code}</span>
        <div style="display:flex;align-items:center;gap:4px">
          ${live?'<span class="bk-live-dot"></span><span style="font-size:9px;color:#f97316;font-weight:700">LIVE</span>':''}
          ${done?'<span style="font-size:10px;color:#22c55e;font-weight:700">✓</span>':''}
        </div></div>
      <div class="bk-row ${rA}">
        <div class="bk-pill ${pcA}" title="${esc(m.seedA||'')}">${plA}</div>
        <div class="bk-tname" title="${esc(nA)}">${esc(nA)}</div>${scA}
      </div>
      <div class="bk-row ${rB}">
        <div class="bk-pill ${pcB}" title="${esc(m.seedB||'')}">${plB}</div>
        <div class="bk-tname" title="${esc(nB)}">${esc(nB)}</div>${scB}
      </div>
    </div>`;
  };

  const mkConn=(nPairs,ccCls)=>{
    let h=`<div class="bk-conn-col ${ccCls}">`;
    for(let i=0;i<nPairs;i++)h+=`<div class="bk-conn-pair"><div class="bk-conn-arm arm-top"></div><div class="bk-conn-arm arm-bot"></div></div>`;
    return h+'</div>';
  };
  const connCls=(r)=>{if(r.fromFin===0)return'cc-final';if(r.fromFin===1)return'cc-sf';if(r.fromFin===2)return'cc-qf';return'';};
  const roundLblCls=(r)=>{if(r.fromFin===0)return'lbl-final';if(r.fromFin===1)return'lbl-sf';if(r.fromFin===2)return'lbl-qf';if(r.fromFin>=3)return'lbl-r16';return'';};
  const matchRoundCls=(r,isLast)=>{if(isLast)return'c-final';if(r.fromFin===1)return'c-sf';if(r.fromFin===2)return'c-qf';return'';};

  const koRoundsOnly=roundMatches.filter(r=>r.cls!=='bk-h3');
  const h3Round=roundMatches.find(r=>r.cls==='bk-h3');

  // ── KO bracket only ──
  let html='';
  if(koRoundsOnly.length){
    html+='<div class="bk-scroll"><div class="bk-bracket">';
    koRoundsOnly.forEach((round,ri)=>{
      const nM=round.matches.length,isLast=ri===koRoundsOnly.length-1;
      const cc=connCls(round),lc=roundLblCls(round),mc=matchRoundCls(round,isLast);
      if(ri>0)html+=mkConn(nM,cc);
      html+=`<div class="bk-round"><div class="bk-round-label ${lc}">${round.name}</div><div class="bk-round-slots">`;
      round.matches.forEach(m=>{
        const koM=koMatches.find(km=>String(km[3]||'')===m.code);
        const bang2=koM?String(koM[2]||''):'';
        const done=koM&&_bkMatchDone(nd,bang2,m.code);
        const live=_bkIsLive(nd,bang2,m.code);
        const fs=done?_bkGetMatchScore(nd,bang2,m.code):null;
        html+=`<div class="bk-slot">${mkCard(m,done,live,fs,mc)}</div>`;
      });
      html+='</div></div>';
    });
    // Champion
    const ckRound=roundMatches.find(r=>r.fromFin===0);
    let champName='';
    if(ckRound?.matches.length){
      const ckM=ckRound.matches[0];
      const koMck=koMatches.find(km=>String(km[3]||'')===ckM.code);
      if(koMck&&_bkMatchDone(nd,String(koMck[2]||''),ckM.code)){
        const fsCk=_bkGetMatchScore(nd,String(koMck[2]||''),ckM.code);
        if(fsCk)champName=fsCk.scoreA>fsCk.scoreB?(ckM.teamA||String(koMck[4]||'')):(ckM.teamB||String(koMck[7]||''));
      }
    }
    html+=`<div class="bk-champ-wrap"><div class="bk-champ-box"><div class="bk-champ-icon">🏆</div><div class="bk-champ-lbl">Vô địch</div>${champName?`<div class="bk-champ-name">${esc(champName)}</div>`:''}</div></div>`;
    html+='</div></div>';

    if(h3Round?.matches?.length){
      const m3=h3Round.matches[0];
      const koM3=koMatches.find(km=>String(km[3]||'')===m3.code);
      const bang3=koM3?String(koM3[2]||''):'';
      const done3=koM3&&_bkMatchDone(nd,bang3,m3.code);
      const fs3=done3?_bkGetMatchScore(nd,bang3,m3.code):null;
      html+=`<div style="margin-top:10px"><div class="bk-scroll"><div class="bk-bracket"><div class="bk-round"><div class="bk-round-label lbl-3rd">Hạng 3</div><div class="bk-round-slots"><div class="bk-slot">${mkCard(m3,done3,false,fs3,'c-3rd')}</div></div></div></div></div></div>`;
    }
  }else{
    html='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Vòng loại trực tiếp chưa được tạo</div></div>';
  }

  wrap.innerHTML=html;
}

// v37: Fetch cây thi đấu từ SRV BracketTree (GET, public)
async function _fetchBracketTree(nd){
  if(!GS||!nd)return null;
  try{
    const gName=_giaiName||USER_GIAI||'';
    const url=new URL(GS);
    url.searchParams.set('action','bracketTree');
    url.searchParams.set('giai',gName);
    url.searchParams.set('nd',nd);
    url.searchParams.set('_t',Date.now());
    const r=await fetch(url.toString(),{cache:'no-store'});
    const d=await r.json();
    if(d.ok&&d.tree&&d.version){
      _bkTreeCache[nd]={...d.tree,version:d.version};
      _bkTreeVersion=d.version;
      console.log('[PLAYER TREE] Loaded v',d.version,'for',nd,'rounds:',d.tree?.rounds?.length);
      return _bkTreeCache[nd];
    }
  }catch(e){console.warn('[PLAYER TREE] fetch error:',e);}
  return null;
}

// Poll version nhẹ để detect thay đổi
async function _checkBracketVersion(nd){
  if(!GS||!nd)return false;
  try{
    const gName=_giaiName||USER_GIAI||'';
    const url=new URL(GS);
    url.searchParams.set('action','bracketVersion');
    url.searchParams.set('giai',gName);
    url.searchParams.set('nd',nd);
    url.searchParams.set('_t',Date.now());
    const r=await fetch(url.toString(),{cache:'no-store'});
    const d=await r.json();
    if(d.ok&&d.version){
      const cached=_bkTreeCache[nd];
      return !cached||d.version>cached.version;
    }
  }catch(e){}
  return false;
}

function renderBracketTab(){
  const wrap=$('bracket-content');
  const nd=_curNd;
  if(!nd){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Chọn nội dung thi đấu</div><div class="empty-sub">Dùng bộ lọc bên trên để chọn nội dung</div></div>';
    return;
  }

  // v5: nếu mode directKO → ưu tiên snapshot từ Firebase/GAS (có _dkMode=true)
  // Không fallback sang _bkBuildAndRenderTree (cần BXH vòng bảng — không có với directKO)
  const cached=_bkTreeCache[nd];

  // Nếu đã có cache với rounds → render ngay
  if(cached&&cached.rounds&&cached.rounds.length){
    let inner=$('bk-inner');
    if(!inner){
      wrap.innerHTML='<div id="bk-inner"></div>';
      inner=$('bk-inner');
    }
    _bkRenderFromSnapshot(nd,cached,inner);
    // Check version ngầm — nếu có version mới thì fetch + update in-place
    _checkBracketVersion(nd).then(hasNew=>{
      if(!hasNew)return;
      _fetchBracketTree(nd).then(snap=>{
        if(!snap)return;
        const el=$('bk-inner');
        if(el)_bkRenderFromSnapshot(nd,snap,el);
      });
    }).catch(()=>{});
    return;
  }

  // Chưa có cache → hiện loading, fetch snapshot
  wrap.innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-msg">Đang tải cây thi đấu...</div></div>';
  _fetchBracketTree(nd).then(snap=>{
    const w=$('bracket-content');if(!w)return;
    w.innerHTML='<div id="bk-inner"></div>';
    const innerEl=$('bk-inner');
    if(snap&&snap.rounds&&snap.rounds.length){
      _bkRenderFromSnapshot(nd,snap,innerEl);
    } else {
      // v5: directKO không có snapshot → hiện thông báo thay vì build từ BXH
      const isDk = _getNdModePlayer(nd) === 'directKO';
      if(isDk){
        innerEl.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Cây thi đấu chưa được tạo</div><div class="empty-sub">Admin cần vào tab Cây thi đấu → Tạo cây → Áp dụng & Tạo lịch</div></div>';
      } else {
        _bkBuildAndRenderTree(nd,innerEl);
      }
    }
  }).catch(()=>{
    const w=$('bracket-content');if(!w)return;
    w.innerHTML='<div id="bk-inner"></div>';
    const isDk = _getNdModePlayer(nd) === 'directKO';
    if(!isDk) _bkBuildAndRenderTree(nd,$('bk-inner'));
    else $('bk-inner').innerHTML='<div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-msg">Không thể tải cây thi đấu</div><div class="empty-sub">Kiểm tra kết nối và thử lại</div></div>';
  });
}

// v37: Render cây thi đấu từ snapshot data (không rebuild từ seeds)
function _bkRenderFromSnapshot(nd,snap,wrap){
  if(!snap||!snap.rounds||!snap.rounds.length){
    // v5: directKO không fallback sang _bkBuildAndRenderTree (cần BXH)
    const isDk = snap?._dkMode || _getNdModePlayer(nd)==='directKO';
    if(isDk){
      wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Cây thi đấu chưa có dữ liệu</div></div>';
      return;
    }
    _bkBuildAndRenderTree(nd,wrap);
    return;
  }
  const isDkMode = !!(snap._dkMode); // v5: flag từ GAS v62
  const roundMatches=snap.rounds||[];
  const overrides=snap._overrides||snap.overrides||{};
  const gUp=((_giaiName||USER_GIAI||'')).toUpperCase();
  const allM=_M.filter(m=>String(m[0]||'').trim().toUpperCase()===gUp&&String(m[1]||'')===nd);
  const koMatches=allM.filter(m=>{const v=String(m[9]||'');return v&&v!=='Vòng bảng'&&!v.includes('bảng');});
  const koByCode={};koMatches.forEach(m=>{koByCode[String(m[3]||'')]=m;});

  // ── v5: directKO — không dùng BXH, lookup tên đội từ Matches KO trực tiếp ──
  // ── mode vòng bảng — tính BXH vòng bảng hiện tại ──
  const {seeds:_seeds,bangs:_bangs,bangDone:_bangDone} = isDkMode ? {seeds:{},bangs:[],bangDone:{}} : _bkCalcSeeds(nd);

  // Lookup tên đội từ label
  const _lookupLabel=(label)=>{
    if(!label||label==='BYE'||label.startsWith('Thắng')||label.startsWith('Thua'))return'';
    // v5: directKO — seed label "S1","S2"... → lookup từ snap.rounds vòng 1
    if(isDkMode && /^S\d+$/i.test(label.trim())) {
      const sIdx = parseInt(label.trim().slice(1)) - 1;
      if(snap._meta?.allSeeds?.[sIdx]) return snap._meta.allSeeds[sIdx].team||'';
      // Fallback: tìm trong vòng đầu tiên của snapshot
      const firstRound = snap.rounds[0];
      if(firstRound) {
        for(const m of firstRound.matches||[]) {
          if(m.seedA===label && m.teamA) return m.teamA;
          if(m.seedB===label && m.teamB) return m.teamB;
        }
      }
      return '';
    }
    // Short: "1A", "2B"...
    let mc=(label||'').trim().match(/^([1-4])([A-Z])$/i);
    // Long: "Nhất Bảng A", "Nhì Bảng B"...
    if(!mc){
      const rank2=label.includes('Nhất')?1:label.includes('Nhì')?2:label.includes('Ba')?3:label.includes('Tư')?4:0;
      const bm2=label.match(/Bảng\s+([A-Z])/i);
      if(rank2&&bm2)mc=[null,String(rank2),bm2[1]];
    }
    if(!mc)return'';
    const rank=parseInt(mc[1]),bangChar=mc[2].toUpperCase();
    const bangKey=_bangs.find(b=>b===bangChar||b.toUpperCase()===bangChar||b.replace(/^Bảng\s+/i,'').trim().toUpperCase()===bangChar);
    if(!bangKey||!_bangDone?.[bangKey])return'';
    const entry=(_seeds[bangKey]||[]).find(x=>x.rank===rank);
    return entry?entry.team:'';
  };

  // ── Bước 2: Merge overrides (isBye flags, seedCode labels) ──
  roundMatches.forEach(round=>{round.matches.forEach(m=>{
    const ov=overrides[m.code];if(!ov)return;
    if(ov.isByeA===true&&!ov.byeAOverridden){m.isByeA=true;m.teamA='';m.seedA='BYE';}
    if(ov.isByeB===true&&!ov.byeBOverridden){m.isByeB=true;m.teamB='';m.seedB='BYE';}
    if(ov.seedCodeA&&!ov.isByeA){m.isByeA=false;m.seedA=ov.seedCodeA;}
    if(ov.seedCodeB&&!ov.isByeB){m.isByeB=false;m.seedB=ov.seedCodeB;}
    if(ov.byeAOverridden)m.isByeA=false;
    if(ov.byeBOverridden)m.isByeB=false;
    // FIX v3.1: Chỉ overwrite teamA/B nếu override cho giá trị tốt hơn snapshot
    // ov.teamA='' không overwrite m.teamA đã có từ snapshot (tránh xóa tên đội đúng)
    if(ov.teamA)m.teamA=ov.teamA;
    if(ov.teamB)m.teamB=ov.teamB;
  });});

  // ── Bước 3: Patch tên đội cho TẤT CẢ vòng từ nguồn dữ liệu hiện tại ──
  // directKO: lookup từ snap._meta.allSeeds hoặc vòng 1 của snapshot
  // vòng bảng: lookup từ BXH (_lookupLabel với "1A", "Nhất Bảng A"...)
  roundMatches.forEach(round=>{round.matches.forEach(m=>{
    if(!m.teamA&&m.seedA&&!m.isByeA){const t=_lookupLabel(m.seedA);if(t)m.teamA=t;}
    if(!m.teamB&&m.seedB&&!m.isByeB){const t=_lookupLabel(m.seedB);if(t)m.teamB=t;}
  });});

  // ── Bước 4: Re-resolve seedCode trong overrides ──
  // Chỉ chạy với mode vòng bảng (directKO không dùng seedCode kiểu "2I")
  if(!isDkMode){roundMatches.forEach(round=>{round.matches.forEach(m=>{
    const ov=overrides[m.code];if(!ov)return;
    if(!m.teamA&&ov.seedCodeA){const t=_bkLookupSeedCode(nd,ov.seedCodeA);if(t)m.teamA=t;}
    if(!m.teamB&&ov.seedCodeB){const t=_bkLookupSeedCode(nd,ov.seedCodeB);if(t)m.teamB=t;}
  });});}

  // FIX v3: Sau khi merge overrides, propagate winner của các trận BYE-auto-advance
  // vào vòng sau (round-0 BYE slots mà đội thực đã được gán → advance tự động)
  const _getWinnerFromRound0=(code)=>{
    for(const round of roundMatches){
      const m=round.matches.find(x=>x.code===code);
      if(!m)continue;
      // Có kết quả sheet
      const koM=koByCode[code];
      if(koM&&_bkMatchDone(nd,String(koM[2]||''),code)){
        const fs=_bkGetMatchScore(nd,String(koM[2]||''),code);
        if(fs)return fs.scoreA>fs.scoreB?(m.teamA||String(koM[4]||'')):(m.teamB||String(koM[7]||''));
      }
      // BYE auto-advance: một bên là BYE, bên kia advance
      if(m.isByeA&&!m.isByeB&&m.teamB)return m.teamB;
      if(m.isByeB&&!m.isByeA&&m.teamA)return m.teamA;
      // Override: byeA nhưng đã gán đội thực → đội đó advance
      const ov2=overrides[code]||{};
      if((ov2._hasByeA||ov2.isByeA)&&ov2.byeAOverridden&&m.teamA)return m.teamA;
      if((ov2._hasByeB||ov2.isByeB)&&ov2.byeBOverridden&&m.teamB)return m.teamB;
      // seedCode assigned to BYE slot → advance
      if(ov2.seedCodeA&&(m.isByeB||ov2._hasByeB)&&m.teamA)return m.teamA;
      if(ov2.seedCodeB&&(m.isByeA||ov2._hasByeA)&&m.teamB)return m.teamB;
      return '';
    }
    return '';
  };
  // Propagate winners vào later rounds (teamA/teamB của "Thắng VxxNN")
  roundMatches.forEach(round=>{
    round.matches.forEach(m=>{
      if(!m.teamA&&m.seedA&&m.seedA.startsWith('Thắng ')){
        const src=m.seedA.replace('Thắng ','').trim();
        const w=_getWinnerFromRound0(src);
        if(w)m.teamA=w;
      }
      if(!m.teamB&&m.seedB&&m.seedB.startsWith('Thắng ')){
        const src=m.seedB.replace('Thắng ','').trim();
        const w=_getWinnerFromRound0(src);
        if(w)m.teamB=w;
      }
    });
  });

  // Pill helpers
  const pillCls=(s)=>{
    if(!s)return'p-num';if(s.startsWith('Thắng')||s==='W')return'p-w';if(s.startsWith('BYE'))return'p-bye';
    const sm=s.match(/^[1-4]([A-Z])$/i);if(sm)return'p-'+sm[1].toUpperCase();
    const bm=s.match(/Bảng\s+([A-Z])/i);if(bm)return'p-'+bm[1].toUpperCase();return'p-num';
  };
  const pillLabel=(s)=>{
    if(!s)return'?';if(s.startsWith('Thắng'))return'W';if(s==='BYE')return'BYE';
    if(/^[1-4][A-Z]$/i.test(s.trim()))return s.trim().toUpperCase();
    const rank=s.includes('Nhất')?1:s.includes('Nhì')?2:s.includes('Ba')?3:s.includes('Tư')?4:0;
    const bm=s.match(/Bảng\s+([A-Z])/i);const bg=bm?bm[1].toUpperCase():'';
    if(rank&&bg)return rank+bg;return'?';
  };
  // v4 FIX: đọc _byeRule từ snap để hiển thị Lucky đúng như admin
  const _byeRule = snap._byeRule || 'bye';
  const mkCard=(m,done,live,fs,mc,liveFs)=>{
    const tA=m.teamA||'',tB=m.teamB||'';
    const winA=fs&&fs.scoreA>fs.scoreB,winB=fs&&fs.scoreB>fs.scoreA;
    const liveWinA=liveFs&&liveFs.scoreA>liveFs.scoreB,liveWinB=liveFs&&liveFs.scoreB>liveFs.scoreA;
    const cardCls='bk-card'+(done?' c-done':'')+(live?' c-live':'')+(mc?' '+mc:'');
    const _ov=overrides[m.code]||{};
    const luckyPickedA=m.isByeA&&_ov.byeAOverridden&&tA;
    const luckyPickedB=m.isByeB&&_ov.byeBOverridden&&tB;
    const isLuckySlotA=m.isByeA&&(_byeRule==='lucky'||_ov.byeModeA==='lucky')&&!luckyPickedA;
    const isLuckySlotB=m.isByeB&&(_byeRule==='lucky'||_ov.byeModeB==='lucky')&&!luckyPickedB;
    const rA=m.isByeA?(luckyPickedA?'':isLuckySlotA?'r-lucky':'r-bye'):(!tA?'r-tbd':winA?'r-win':'');
    const rB=m.isByeB?(luckyPickedB?'':isLuckySlotB?'r-lucky':'r-bye'):(!tB?'r-tbd':winB?'r-win':'');
    const nA=m.isByeA?(luckyPickedA?(tA||'—'):isLuckySlotA?'🍀 Lucky':'BYE'):(tA||'—');
    const nB=m.isByeB?(luckyPickedB?(tB||'—'):isLuckySlotB?'🍀 Lucky':'BYE'):(tB||'—');
    // v4 FIX: Lucky slot chưa chọn đội → pill hiện '🍀' thay vì 'BYE'
    const plA=luckyPickedA?(_ov.luckyLabelA||'🍀'):isLuckySlotA?'🍀':pillLabel(m.seedA||'');
    const plB=luckyPickedB?(_ov.luckyLabelB||'🍀'):isLuckySlotB?'🍀':pillLabel(m.seedB||'');
    const pcA=isLuckySlotA?'p-lucky':pillCls(m.seedA||'');
    const pcB=isLuckySlotB?'p-lucky':pillCls(m.seedB||'');
    // Score box: done → kết quả chính thức, live → tỉ số realtime
    let scA,scB;
    if(fs){
      scA=`<div class="bk-sbox${winA?' s-win':''}">${fs.scoreA}</div>`;
      scB=`<div class="bk-sbox${winB?' s-win':''}">${fs.scoreB}</div>`;
    }else if(live&&liveFs){
      scA=`<div class="bk-sbox s-live${liveWinA?' s-lead':''}">${liveFs.scoreA}</div>`;
      scB=`<div class="bk-sbox s-live${liveWinB?' s-lead':''}">${liveFs.scoreB}</div>`;
    }else{
      scA='<div class="bk-sbox s-empty">—</div>';
      scB='<div class="bk-sbox s-empty">—</div>';
    }
    return`<div class="${cardCls}">
      <div class="bk-card-hd"><span>${m.code}</span>
        <div style="display:flex;align-items:center;gap:4px">
          ${live?'<span class="bk-live-dot"></span><span style="font-size:9px;color:#f97316;font-weight:700">LIVE</span>':''}
          ${done?'<span style="font-size:10px;color:#22c55e;font-weight:700">✓</span>':''}
        </div></div>
      <div class="bk-row ${rA}">
        <div class="bk-pill ${pcA}" title="${esc(m.seedA||'')}">${plA}</div>
        <div class="bk-tname" title="${esc(nA)}">${esc(nA)}</div>${scA}
      </div>
      <div class="bk-row ${rB}">
        <div class="bk-pill ${pcB}" title="${esc(m.seedB||'')}">${plB}</div>
        <div class="bk-tname" title="${esc(nB)}">${esc(nB)}</div>${scB}
      </div>
    </div>`;
  };
  const mkConn=(nP,cc)=>{let h=`<div class="bk-conn-col ${cc}">`;for(let i=0;i<nP;i++)h+=`<div class="bk-conn-pair"><div class="bk-conn-arm arm-top"></div><div class="bk-conn-arm arm-bot"></div></div>`;return h+'</div>';};
  const connCls=(r)=>{if(r.fromFin===0)return'cc-final';if(r.fromFin===1)return'cc-sf';if(r.fromFin===2)return'cc-qf';return'';};
  const roundLblCls=(r)=>{if(r.fromFin===0)return'lbl-final';if(r.fromFin===1)return'lbl-sf';if(r.fromFin===2)return'lbl-qf';if(r.fromFin>=3)return'lbl-r16';return'';};
  const matchRoundCls=(r,isLast)=>{if(isLast)return'c-final';if(r.fromFin===1)return'c-sf';if(r.fromFin===2)return'c-qf';return'';};

  const koRoundsOnly=roundMatches.filter(r=>r.cls!=='bk-h3');
  const h3Round=roundMatches.find(r=>r.cls==='bk-h3');
  let html='';
  if(koRoundsOnly.length){
    html+='<div class="bk-scroll"><div class="bk-bracket">';
    koRoundsOnly.forEach((round,ri)=>{
      const nM=round.matches.length,isLast=ri===koRoundsOnly.length-1;
      if(ri>0)html+=mkConn(nM,connCls(round));
      html+=`<div class="bk-round"><div class="bk-round-label ${roundLblCls(round)}">${round.name}</div><div class="bk-round-slots">`;
      round.matches.forEach(m=>{
        const koM=koByCode[m.code];
        const bang2=koM?String(koM[2]||''):'';
        const done=koM&&_bkMatchDone(nd,bang2,m.code);
        const live=_bkIsLive(nd,bang2,m.code);
        const fs=done?_bkGetMatchScore(nd,bang2,m.code):null;
        // Live score từ _L (realtime)
        let liveFs=null;
        if(live){
          const lRow=getLiveByKey(nd,bang2,m.code);
          if(lRow)liveFs={scoreA:Number(lRow[3]||0),scoreB:Number(lRow[4]||0)};
        }
        html+=`<div class="bk-slot">${mkCard(m,done,live,fs,matchRoundCls(round,isLast),liveFs)}</div>`;
      });
      html+='</div></div>';
    });
    // Champion
    const ckR=roundMatches.find(r=>r.fromFin===0);
    let champName='';
    if(ckR?.matches?.length){
      const ckM=ckR.matches[0];const koMck=koByCode[ckM.code];
      if(koMck&&_bkMatchDone(nd,String(koMck[2]||''),ckM.code)){
        const fsCk=_bkGetMatchScore(nd,String(koMck[2]||''),ckM.code);
        if(fsCk)champName=fsCk.scoreA>fsCk.scoreB?(ckM.teamA||String(koMck[4]||'')):(ckM.teamB||String(koMck[7]||''));
      }
    }
    html+=`<div class="bk-champ-wrap"><div class="bk-champ-box"><div class="bk-champ-icon">🏆</div><div class="bk-champ-lbl">Vô địch</div>${champName?`<div class="bk-champ-name">${esc(champName)}</div>`:''}</div></div>`;
    html+='</div></div>';
    if(h3Round?.matches?.length){
      const m3=h3Round.matches[0];const koM3=koByCode[m3.code];
      const bang3=koM3?String(koM3[2]||''):'';
      const done3=koM3&&_bkMatchDone(nd,bang3,m3.code);
      const live3=!done3&&_bkIsLive(nd,bang3,m3.code);
      const fs3=done3?_bkGetMatchScore(nd,bang3,m3.code):null;
      let liveFs3=null;
      if(live3){const lRow3=getLiveByKey(nd,bang3,m3.code);if(lRow3)liveFs3={scoreA:Number(lRow3[3]||0),scoreB:Number(lRow3[4]||0)};}
      html+=`<div style="margin-top:10px"><div class="bk-scroll"><div class="bk-bracket"><div class="bk-round"><div class="bk-round-label lbl-3rd">Hạng 3</div><div class="bk-round-slots"><div class="bk-slot">${mkCard(m3,done3,live3,fs3,'c-3rd',liveFs3)}</div></div></div></div></div></div>`;
    }
  }else{
    html='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-msg">Vòng loại trực tiếp chưa được tạo</div></div>';
  }
  wrap.innerHTML=html;
}

// ══ BOOT ══
async function autoLoginFromCache(){
  try{
    // Thử playerInit (Máy chủ mới) — fallback validate (Máy chủ cũ)
    let d=null, hasData=false;
    try{
      const r1=await fetch(`${GS}?action=playerInit&device=player-web&_t=${Date.now()}&code=${encodeURIComponent(USER_CODE)}`,{cache:'no-store'});
      if(r1.ok){const j=await r1.json();if(j.valid!==undefined&&j.reason!=='unknown_action'){d=j;hasData=!!(j.matches);}}
    }catch(e1){}
    if(!d){
      const r2=await fetch(`${GS}?action=validate&device=player-web&_t=${Date.now()}&code=${encodeURIComponent(USER_CODE)}`,{cache:'no-store'});
      if(!r2.ok)return false;
      d=await r2.json();
    }
    if(!d.valid)return false;
    const st=(d.statusRaw||'').toLowerCase();
    if(st==='khóa'||st==='disabled')return false;
    USER_NAME=d.name||''; USER_CODE=d.code||USER_CODE;
    USER_GIAI=d.giai||''; USER_ND=d.noidung||'';
    if(!USER_GIAI.trim())return false;
    localStorage.setItem('pb_player_v6',JSON.stringify({u:GS,c:USER_CODE,n:USER_NAME,g:USER_GIAI,nd:USER_ND}));
    if(hasData){_applyPlayerInitData(d);return 'withData';}
    _clearDataCache();
    return true;
  }catch(e){return false;}
}

// Áp dụng data từ playerInit vào bộ nhớ
function _applyPlayerInitData(d){
  _clearDataCache();
  if(d.tournaments?.rows?.length>1){const trows=d.tournaments.rows.slice(1);_T=trows[0]||null;_giaiName=_T?String(_T[1]||'').trim():'';}
  if(d.matches?.rows?.length>1)_M=d.matches.rows.slice(1);
  if(d.results?.rows?.length>1)_R=d.results.rows.slice(1);
  if(d.live?.rows?.length>1)_L=d.live.rows.slice(1).filter(r=>String(r[9]||'').toLowerCase()!=='finished');
  else _L=[];
  buildNdList();renderTopBar();renderNdFilter();setUpdateTime();
  const lb=$('tb-live');if(lb)lb.style.display=_L.length?'flex':'none';
  console.log('[playerInit]',_giaiName,'M:',_M.length,'L:',_L.length);
}

    if(ok){
      startApp(ok==='withData'); // withData=true → skip loadAll; true → cần loadAll
    }else{
      // validate thất bại hoặc chưa có phân quyền → xóa cache, hiện login
      localStorage.removeItem('pb_player_v6');
      localStorage.removeItem(_LAST_ACTIVE_KEY);
      $('login-screen').style.display='flex'; // hiện lại login form
    }
  }
});
</script>
</body>
</html>
